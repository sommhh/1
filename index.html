<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>現場トイレ・駐車場</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f1115;
  --card:#1a1d24;
  --accent:#38bdf8;
  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
  --text:#f5f7fa;
  --muted:#9aa4b2;
  --border:#2a2f3a;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
}

#map{
  position:fixed;
  inset:0;
  z-index:1;
}

.topbar{
  position:fixed;
  top:12px;
  left:12px;
  right:12px;
  z-index:1000;
  display:flex;
  gap:10px;
}

.action-btn{
  flex:1;
  border:none;
  background:rgba(26,29,36,.95);
  backdrop-filter:blur(10px);
  color:white;
  padding:18px 14px;
  border-radius:18px;
  font-size:18px;
  font-weight:700;
  border:1px solid var(--border);
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}

.action-btn.active{
  border:1px solid var(--accent);
  box-shadow:0 0 0 2px rgba(56,189,248,.2);
}

.bottom-sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:1000;
  background:rgba(15,17,21,.97);
  backdrop-filter:blur(12px);
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  border-top:1px solid var(--border);
  max-height:42vh;
  overflow:auto;
  padding:16px;
}

.sheet-title{
  font-size:18px;
  font-weight:800;
  margin-bottom:14px;
}

.result-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.result-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.result-name{
  font-weight:700;
  font-size:15px;
  line-height:1.4;
}

.distance{
  color:var(--accent);
  font-size:13px;
  font-weight:700;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

.tag{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.green{background:rgba(34,197,94,.18);color:#7df3a3;}
.yellow{background:rgba(250,204,21,.18);color:#ffe26a;}
.red{background:rgba(239,68,68,.18);color:#ff8e8e;}
.blue{background:rgba(56,189,248,.18);color:#7fdcff;}

.route-btn{
  width:100%;
  border:none;
  background:var(--accent);
  color:#08131b;
  font-weight:800;
  padding:12px;
  border-radius:12px;
  font-size:15px;
}

.loading{
  text-align:center;
  padding:30px 10px;
  color:var(--muted);
}

.status{
  position:fixed;
  top:84px;
  left:12px;
  right:12px;
  z-index:1000;
  background:rgba(15,17,21,.9);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
  font-size:13px;
  color:var(--muted);
}

.leaflet-popup-content-wrapper{
  background:#1b1f27;
  color:white;
  border-radius:16px;
}

.leaflet-popup-tip{
  background:#1b1f27;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <button id="toiletBtn" class="action-btn active">🚻 トイレ</button>
  <button id="parkingBtn" class="action-btn">🅿️ 駐車場</button>
</div>

<div class="status" id="status">
  GPS取得中...
</div>

<div class="bottom-sheet">
  <div class="sheet-title" id="sheetTitle">近くのトイレ</div>
  <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const state = {
  mode:'toilet',
  map:null,
  userMarker:null,
  markers:[],
  userLat:null,
  userLon:null,
  radius:500
};

const map = L.map('map', {
  zoomControl:false
}).setView([38.2324,140.8995], 15);

state.map = map;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

const userIcon = L.divIcon({
  className:'',
  html:`
    <div style="
      width:20px;
      height:20px;
      border-radius:50%;
      background:#38bdf8;
      border:4px solid white;
      box-shadow:0 0 20px rgba(56,189,248,.8);
    "></div>
  `,
  iconSize:[20,20]
});

async function initGPS(){
  if(!navigator.geolocation){
    setStatus('GPS未対応');
    return;
  }

  navigator.geolocation.watchPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    state.userLat = lat;
    state.userLon = lon;

    setStatus(`現在地取得 OK / 半径${state.radius}m検索`);

    if(!state.userMarker){
      state.userMarker = L.marker([lat,lon],{icon:userIcon}).addTo(map);
      map.setView([lat,lon],16);
    }else{
      state.userMarker.setLatLng([lat,lon]);
    }

    await loadNearby();

  }, err=>{
    setStatus('GPS取得失敗');
    console.error(err);
  }, {
    enableHighAccuracy:true,
    maximumAge:3000,
    timeout:10000
  });
}

function setStatus(text){
  document.getElementById('status').textContent = text;
}

function clearMarkers(){
  state.markers.forEach(m=>map.removeLayer(m));
  state.markers = [];
}

async function loadNearby(){
  if(!state.userLat) return;

  clearMarkers();

  document.getElementById('results').innerHTML = `
    <div class="loading">検索中...</div>
  `;

  const query = state.mode === 'toilet'
    ? buildToiletQuery()
    : buildParkingQuery();

  const url = 'https://overpass-api.de/api/interpreter';

  try{
    const res = await fetch(url, {
      method:'POST',
      body:query
    });

    const data = await res.json();

    renderResults(data.elements || []);

  }catch(err){
    console.error(err);

    document.getElementById('results').innerHTML = `
      <div class="loading">通信失敗</div>
    `;
  }
}

function buildToiletQuery(){
  return `
[out:json][timeout:25];
(
  node["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});
  way["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});
  node["public_toilet"="yes"](around:${state.radius},${state.userLat},${state.userLon});
  node["toilets"="yes"](around:${state.radius},${state.userLat},${state.userLon});
  node["railway"="station"](around:${state.radius},${state.userLat},${state.userLon});
);
out center;
  `;
}

function buildParkingQuery(){
  return `
[out:json][timeout:25];
(
  node["amenity"="parking"](around:${state.radius},${state.userLat},${state.userLon});
  way["amenity"="parking"](around:${state.radius},${state.userLat},${state.userLon});
);
out center;
  `;
}

function renderResults(items){
  const results = document.getElementById('results');

  if(!items.length){

    if(state.radius < 2000){
      state.radius += 500;
      setStatus(`見つからないため半径${state.radius}mへ拡張`);
      loadNearby();
      return;
    }

    results.innerHTML = `
      <div class="loading">見つかりませんでした</div>
    `;
    return;
  }

  const normalized = items.map(item=>{
    const lat = item.lat || item.center?.lat;
    const lon = item.lon || item.center?.lon;

    const distance = calcDistance(
      state.userLat,
      state.userLon,
      lat,
      lon
    );

    return {
      ...item,
      lat,
      lon,
      distance
    };
  }).filter(i=>i.lat && i.lon)
    .sort((a,b)=>a.distance-b.distance)
    .slice(0,15);

  results.innerHTML = normalized.map(item=>cardHTML(item)).join('');

  normalized.forEach(item=>{

    const marker = L.marker([item.lat,item.lon]).addTo(map);

    marker.bindPopup(`
      <div style="min-width:180px">
        <b>${escapeHTML(getName(item))}</b><br><br>
        ${Math.round(item.distance)}m
      </div>
    `);

    state.markers.push(marker);
  });

  attachRouteButtons(normalized);
}

function cardHTML(item){
  const name = getName(item);

  const tags = buildTags(item);

  return `
    <div class="result-card">
      <div class="result-top">
        <div class="result-name">${escapeHTML(name)}</div>
        <div class="distance">${Math.round(item.distance)}m</div>
      </div>

      <div class="tags">
        ${tags}
      </div>

      <button
        class="route-btn"
        data-lat="${item.lat}"
        data-lon="${item.lon}"
      >
        ルート案内
      </button>
    </div>
  `;
}

function buildTags(item){
  const tags = [];

  if(state.mode === 'toilet'){
    tags.push(tag('🚻 トイレ','green'));

    if(item.tags?.public_toilet === 'yes'){
      tags.push(tag('🌙 公衆','blue'));
    }

    if(item.tags?.railway === 'station'){
      tags.push(tag('🚉 駅','yellow'));
    }

    if(item.tags?.access === 'yes'){
      tags.push(tag('♿ バリアフリー','blue'));
    }

  }else{
    tags.push(tag('🅿️ 駐車場','green'));

    if(item.tags?.parking === 'surface'){
      tags.push(tag('🚚 平面','yellow'));
    }

    if(item.tags?.fee === 'no'){
      tags.push(tag('💴 無料','blue'));
    }
  }

  return tags.join('');
}

function tag(text,color){
  return `<div class="tag ${color}">${text}</div>`;
}

function getName(item){
  return item.tags?.name || '名称未登録';
}

function attachRouteButtons(items){
  document.querySelectorAll('.route-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const lat = btn.dataset.lat;
      const lon = btn.dataset.lon;

      const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

      window.open(url,'_blank');
    };
  });
}

function calcDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
    Math.cos(φ1) * Math.cos(φ2) *
    Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

function escapeHTML(str=''){
  return str
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

const toiletBtn = document.getElementById('toiletBtn');
const parkingBtn = document.getElementById('parkingBtn');

function switchMode(mode){
  state.mode = mode;
  state.radius = 500;

  toiletBtn.classList.remove('active');
  parkingBtn.classList.remove('active');

  if(mode === 'toilet'){
    toiletBtn.classList.add('active');
    document.getElementById('sheetTitle').textContent = '近くのトイレ';
  }else{
    parkingBtn.classList.add('active');
    document.getElementById('sheetTitle').textContent = '近くの駐車場';
  }

  loadNearby();
}

toiletBtn.onclick = ()=>switchMode('toilet');
parkingBtn.onclick = ()=>switchMode('parking');

// ===== 公園・観光地・道の駅 強化 =====

function buildEnhancedToiletQuery(){
  return `
[out:json][timeout:25];
(
  node["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});
  way["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});

  node["railway"="station"](around:${state.radius},${state.userLat},${state.userLon});
  way["railway"="station"](around:${state.radius},${state.userLat},${state.userLon});

  node["tourism"](around:${state.radius},${state.userLat},${state.userLon});
  way["tourism"](around:${state.radius},${state.userLat},${state.userLon});

  node["highway"="rest_area"](around:${state.radius},${state.userLat},${state.userLon});
  way["highway"="rest_area"](around:${state.radius},${state.userLat},${state.userLon});

  way["leisure"="park"](around:${state.radius},${state.userLat},${state.userLon});
);
out center tags;
  `;
}

// 既存トイレ検索を強化版へ切替
buildToiletQuery = buildEnhancedToiletQuery;

// ===== 公園近接トイレ判定 =====

function isPark(item){
  return item.tags?.leisure === 'park';
}

function isStation(item){
  return item.tags?.railway === 'station';
}

function isTourism(item){
  return !!item.tags?.tourism;
}

function isRestArea(item){
  return item.tags?.highway === 'rest_area';
}

// ===== キャッシュ =====

const CACHE_KEY = 'genba-map-cache-v1';

function saveCache(data){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      time:Date.now(),
      data
    }));
  }catch(err){
    console.error(err);
  }
}

function loadCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;

    const parsed = JSON.parse(raw);

    if(Date.now() - parsed.time > 1000 * 60 * 15){
      return null;
    }

    return parsed.data;
  }catch(err){
    return null;
  }
}

// ===== 高速再検索 =====

const originalLoadNearby = loadNearby;

loadNearby = async function(){
  const cache = loadCache();

  if(cache && cache.mode === state.mode){
    renderResults(cache.items || []);
  }

  await originalLoadNearby();
};

// ===== renderResults拡張 =====

const originalRenderResults = renderResults;

renderResults = function(items){

  saveCache({
    mode:state.mode,
    items
  });

  originalRenderResults(items);
};

// ===== タグ強化 =====

const originalBuildTags = buildTags;

buildTags = function(item){
  const tags = [];

  if(isPark(item)){
    tags.push(tag('🌳 公園','green'));
  }

  if(isStation(item)){
    tags.push(tag('🚉 駅','yellow'));
  }

  if(isTourism(item)){
    tags.push(tag('🏞 観光地','blue'));
  }

  if(isRestArea(item)){
    tags.push(tag('🛣 道の駅系','green'));
  }

  return tags.join('') + originalBuildTags(item);
};

// ===== PWA準備 =====

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .catch(err=>console.error(err));
  });
}

// ===== 拡張カテゴリ対応 =====

function isAirport(item){
  return item.tags?.aeroway === 'aerodrome';
}

function isBookStore(item){
  return item.tags?.shop === 'books';
}

function isElectronics(item){
  return item.tags?.shop === 'electronics';
}

function isShrine(item){
  return item.tags?.religion === 'shinto';
}

function isTemple(item){
  return item.tags?.religion === 'buddhist';
}

function isFuel(item){
  return item.tags?.amenity === 'fuel';
}

// ===== 現場カテゴリ統合検索 =====

  return `

(
  node["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});
  way["amenity"="toilets"](around:${state.radius},${state.userLat},${state.userLon});

  node["railway"="station"](around:${state.radius},${state.userLat},${state.userLon});

// ===== IndexedDB完全化 =====

let db;

function initDB(){
  return new Promise((resolve,reject)=>{

    const req = indexedDB.open('genba-map-db',1);

    req.onupgradeneeded = e=>{
      const db = e.target.result;

      if(!db.objectStoreNames.contains('places')){
        db.createObjectStore('places',{ keyPath:'id' });
      }
    };

    req.onsuccess = e=>{
      db = e.target.result;
      resolve();
    };

    req.onerror = reject;
  });
}

async function savePlaces(items){
  if(!db) return;

  const tx = db.transaction('places','readwrite');
  const store = tx.objectStore('places');

  items.forEach(item=>{
    store.put({
      id:item.id || Math.random(),
      data:item,
      time:Date.now()
    });
  });
}

// ===== 24h推定 =====

function is24h(item){
  const opening = item.tags?.opening_hours || '';

  return opening.includes('24') ||
    item.tags?.access === 'yes' ||
    isStation(item) ||
    isRestArea(item);
}

// ===== 外トイレ推定 =====

function hasOutdoorToilet(item){
  return isPark(item)
    || isShrine(item)
    || isTemple(item)
    || isRestArea(item)
    || isTourism(item);
}

// ===== GPS省電力制御 =====

let lastGPSUpdate = 0;

const originalInitGPS = initGPS;

initGPS = function(){

  if(!navigator.geolocation){
    setStatus('GPS未対応');
    return;
  }

  navigator.geolocation.watchPosition(async pos=>{

    const now = Date.now();

    if(now - lastGPSUpdate < 5000){
      return;
    }

    lastGPSUpdate = now;

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    state.userLat = lat;
    state.userLon = lon;

    setStatus(`現場モード動作中 / 半径${state.radius}m`);

    if(!state.userMarker){
      state.userMarker = L.marker([lat,lon],{icon:userIcon}).addTo(map);
      map.setView([lat,lon],16);
    }else{
      state.userMarker.setLatLng([lat,lon]);
    }

    await loadNearby();

  }, err=>{
    console.error(err);
    setStatus('GPS取得失敗');
  }, {
    enableHighAccuracy:true,
    maximumAge:10000,
    timeout:15000
  });
};

// ===== タグ強化 =====

const oldBuildTags2 = buildTags;

buildTags = function(item){

  const extra = [];

  if(isAirport(item)){
    extra.push(tag('✈️ 空港','blue'));
  }

  if(isBookStore(item)){
    extra.push(tag('📚 本屋','yellow'));
  }

  if(isElectronics(item)){
    extra.push(tag('📺 家電','yellow'));
  }

  if(isShrine(item)){
    extra.push(tag('⛩ 神社','green'));
  }

  if(isTemple(item)){
    extra.push(tag('🛕 寺','green'));
  }

  if(isFuel(item)){
    extra.push(tag('⛽ GS','blue'));
  }

  if(is24h(item)){
    extra.push(tag('🌙 24h候補','green'));
  }

  if(hasOutdoorToilet(item)){
    extra.push(tag('🚻 外トイレ候補','yellow'));
  }

  return extra.join('') + oldBuildTags2(item);
};

// ===== Supercluster 高速化 =====

let clusterGroup = null;

function initClusterLayer(){
  if(clusterGroup){
    map.removeLayer(clusterGroup);
  }

  clusterGroup = L.layerGroup().addTo(map);
}

function addClusterMarker(lat,lon,popup){
  if(!clusterGroup){
    initClusterLayer();
  }

  const marker = L.marker([lat,lon]);

  marker.bindPopup(popup);

  clusterGroup.addLayer(marker);
}

// ===== タイルキャッシュ =====

const tileCache = new Map();

async function cacheTile(url){
  try{
    if(tileCache.has(url)) return;

    const res = await fetch(url);
    const blob = await res.blob();

    tileCache.set(url, blob);
  }catch(err){
    console.error(err);
  }
}

// ===== 完全オフライン検索 =====

async function offlineNearbySearch(){
  if(!db) return [];

  return new Promise(resolve=>{

    const tx = db.transaction('places','readonly');
    const store = tx.objectStore('places');
    const req = store.getAll();

    req.onsuccess = ()=>{

      const items = req.result
        .map(v=>v.data)
        .filter(item=>{

          const lat = item.lat || item.center?.lat;
          const lon = item.lon || item.center?.lon;

          if(!lat || !lon) return false;

          const d = calcDistance(
            state.userLat,
            state.userLon,
            lat,
            lon
          );

          return d <= 2000;
        });

      resolve(items);
    };
  });
}

// ===== 駐車しやすさ推定 =====

function estimateParkingScore(item){

  let score = 0;

  if(item.tags?.parking === 'surface'){
    score += 3;
  }

  if(item.tags?.fee === 'no'){
    score += 2;
  }

  if(item.tags?.access !== 'private'){
    score += 2;
  }

  if(item.tags?.capacity){
    const cap = parseInt(item.tags.capacity || 0);

    if(cap >= 20){
      score += 3;
    }
  }

  return score;
}

// ===== 公園内トイレ近接解析 =====

function analyzeParkToiletRelation(items){

  const parks = items.filter(isPark);
  const toilets = items.filter(i=>
    i.tags?.amenity === 'toilets'
  );

  parks.forEach(park=>{

    const plat = park.center?.lat || park.lat;
    const plon = park.center?.lon || park.lon;

    toilets.forEach(toilet=>{

      const tlat = toilet.center?.lat || toilet.lat;
      const tlon = toilet.center?.lon || toilet.lon;

      const d = calcDistance(plat, plon, tlat, tlon);

      if(d <= 120){
        park.hasNearbyToilet = true;
      }
    });
  });

  return items;
}

// ===== Apple Maps / Yahooナビ =====

function openRoute(lat,lon,mode='google'){

  let url = '';

  if(mode === 'apple'){
    url = `https://maps.apple.com/?daddr=${lat},${lon}`;
  }
  else if(mode === 'yahoo'){
    url = `yj-navi://navigation?lat=${lat}&lon=${lon}`;
  }
  else {
    url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
  }

  window.open(url,'_blank');
}

function applyIOSOptimizations(){

  document.body.style.webkitTouchCallout = 'none';
  document.body.style.webkitUserSelect = 'none';

  map.invalidateSize();

  let ticking = false;

  window.addEventListener('touchmove',()=>{

    });

  },{ passive:true });
}

// ===== iPhone低RAM対策 =====

function lowRamProtection(){

  const isiPhone = /iPhone/i.test(navigator.userAgent);

  if(!isiPhone) return;

  if(state.radius > 1000){
    state.radius = 1000;
  }

  document.querySelectorAll('.leaflet-marker-icon').forEach((el,index)=>{
    if(index > 60){
      el.style.display = 'none';
    }
  });
}

// ===== ピン大量描画最適化 =====

function optimizedRenderMarkers(items){

  cleanupMarkers();

  const fragment = [];

  items.slice(0,80).forEach(item=>{

    const lat = item.lat || item.center?.lat;
    const lon = item.lon || item.center?.lon;

    if(!lat || !lon) return;

    const marker = L.circleMarker([lat,lon],{
      radius:7,
      weight:1,
      fillOpacity:0.9
    }).addTo(map);

    marker.bindPopup(`
      <b>${escapeHTML(getName(item))}</b>
    `);

    state.markers.push(marker);
    fragment.push(marker);
  });

  runtimeStats.markerCount = fragment.length;
}

// ===== キャッシュ自動整理 =====

function cleanupCache(){

  const now = Date.now();

  for(const [key,val] of tileCache.entries()){

    if(now - (val.time || now) > 1000 * 60 * 60 * 24){
      tileCache.delete(key);
    }
  }

  try{
    const raw = localStorage.getItem(CACHE_KEY);

    if(raw){
      const parsed = JSON.parse(raw);

      if(now - parsed.time > 1000 * 60 * 60 * 12){
        localStorage.removeItem(CACHE_KEY);
      }
    }
  }catch(err){
    console.error(err);
  }
}

setInterval(cleanupCache, 1000 * 60 * 10);

// ===== バッテリー監視 =====

async function monitorBattery(){

  if(!navigator.getBattery) return;

  try{

    const battery = await navigator.getBattery();

    function apply(){

      if(battery.level < 0.2){

        state.radius = 500;

        setStatus('省電力モード');
      }
    }

    battery.addEventListener('levelchange',apply);

    apply();

  }catch(err){
    console.error(err);
  }
}

// ===== GPSドリフト補正 =====

function correctGPSDrift(lat,lon){

  runtimeStats.gpsHistory.push({
    lat,
    lon,
    time:Date.now()
  });

  if(runtimeStats.gpsHistory.length > 5){
    runtimeStats.gpsHistory.shift();
  }

  const avgLat = runtimeStats.gpsHistory
    .reduce((a,b)=>a+b.lat,0)
    / runtimeStats.gpsHistory.length;

  const avgLon = runtimeStats.gpsHistory
    .reduce((a,b)=>a+b.lon,0)
    / runtimeStats.gpsHistory.length;

  return {
    lat:avgLat,
    lon:avgLon
  };
}

// ===== Overpass APIフォールバック =====

const OVERPASS_ENDPOINTS = [
  'https://overpass-api.de/api/interpreter',
  'https://lz4.overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter'
];

async function fetchOverpass(query){

  for(const endpoint of OVERPASS_ENDPOINTS){

    try{

      const res = await fetch(endpoint,{
        method:'POST',
        body:query
      });

      if(res.ok){
        return await res.json();
      }

    }catch(err){
      console.warn('fallback',endpoint);
    }
  }

  throw new Error('all overpass failed');
}

// ===== 実運用ログ保存 =====

function saveRuntimeLog(type,data={}){

  try{

    const logs = JSON.parse(
      localStorage.getItem('genba-runtime-log') || '[]'
    );

    logs.push({
      type,
      data,
      time:Date.now()
    });

    while(logs.length > 300){
      logs.shift();
    }

    localStorage.setItem(
      'genba-runtime-log',
      JSON.stringify(logs)
    );

  }catch(err){
    console.error(err);
  }
}
