<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場MAP 完全版</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;background:#0f1115;color:#fff;font-family:-apple-system;}
#map{position:fixed;inset:0;}

.topbar{
  position:fixed;top:10px;left:10px;right:10px;z-index:1000;
  display:flex;gap:8px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1a1d24;
  color:white;
  font-weight:700;
}

button.active{outline:2px solid #38bdf8;}

#status{
  position:fixed;top:70px;left:10px;right:10px;
  background:#1a1d24;padding:8px;border-radius:10px;
  font-size:12px;color:#aaa;z-index:1000;
}

.sheet{
  position:fixed;bottom:0;left:0;right:0;
  max-height:40vh;overflow:auto;
  background:#111;padding:10px;z-index:1000;
}
.card{
  background:#1a1d24;margin:8px 0;padding:10px;border-radius:10px;
}
.tag{font-size:11px;margin-right:4px;padding:2px 6px;border-radius:999px;display:inline-block}
.g{background:#22c55e33;color:#22c55e}
.y{background:#facc1533;color:#facc15}
.b{background:#38bdf833;color:#38bdf8}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <button id="t1" class="active">🚻トイレ</button>
  <button id="t2">🅿駐車場</button>
  <button id="t3">🥤DRINK</button>
</div>

<div id="status">起動中...</div>

<div class="sheet">
  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let state={
  map:null,
  user:null,
  markers:[],
  lat:null,
  lon:null,
  mode:"toilet",
  searching:false,
  radius:500
};

const map=L.map("map").setView([38.23,140.89],15);
state.map=map;

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// ---------------- GPS ----------------
navigator.geolocation.watchPosition(p=>{
  state.lat=p.coords.latitude;
  state.lon=p.coords.longitude;

  setStatus("GPS OK");

  if(!state.user){
    state.user=L.marker([state.lat,state.lon]).addTo(map);
    map.setView([state.lat,state.lon],16);
  }else{
    state.user.setLatLng([state.lat,state.lon]);
  }

  search();

},e=>{
  setStatus("GPS ERROR");
},{
  enableHighAccuracy:true,
  maximumAge:0
});

// ---------------- STATUS ----------------
function setStatus(t){
  document.getElementById("status").innerText=t;
  console.log("[STATUS]",t);
}

// ---------------- MODE ----------------
document.getElementById("t1").onclick=()=>setMode("toilet");
document.getElementById("t2").onclick=()=>setMode("parking");
document.getElementById("t3").onclick=()=>setMode("drink");

function setMode(m){
  state.mode=m;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  if(m==="toilet")document.getElementById("t1").classList.add("active");
  if(m==="parking")document.getElementById("t2").classList.add("active");
  if(m==="drink")document.getElementById("t3").classList.add("active");
  search();
}

// ---------------- QUERY ----------------
function query(){

if(state.mode==="parking"){
return `
[out:json];
(
node["amenity"="parking"](around:${state.radius},${state.lat},${state.lon});
);
out center;`;
}

if(state.mode==="drink"){
return `
[out:json];
(
node["amenity"="vending_machine"](around:${state.radius},${state.lat},${state.lon});
node["vending"="drinks"](around:${state.radius},${state.lat},${state.lon});
node["shop"="convenience"](around:${state.radius},${state.lat},${state.lon});
);
out center tags;`;
}

return `
[out:json];
(
node["amenity"="toilets"](around:${state.radius},${state.lat},${state.lon});
node["leisure"="park"](around:${state.radius},${state.lat},${state.lon});
node["railway"="station"](around:${state.radius},${state.lat},${state.lon});
node["religion"](around:${state.radius},${state.lat},${state.lon});
);
out center tags;`;
}

// ---------------- SEARCH ----------------
async function search(){

if(state.searching)return;
if(!state.lat)return;

state.searching=true;

setStatus("検索中...");

try{

const res=await fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query()
});

const data=await res.json();

let items=data.elements||[];

// hotel除外
items=items.filter(i=>{
const n=(i.tags?.name||"").toLowerCase();
return !n.includes("hotel") && i.tags?.tourism!=="hotel";
});

// render
render(items);

}catch(e){
console.log(e);
setStatus("通信エラー");
}

state.searching=false;
}

// ---------------- RENDER ----------------
function render(items){

state.markers.forEach(m=>map.removeLayer(m));
state.markers=[];

document.getElementById("list").innerHTML="";

items.slice(0,50).forEach(i=>{

const lat=i.lat||i.center?.lat;
const lon=i.lon||i.center?.lon;
if(!lat||!lon)return;

const m=L.circleMarker([lat,lon]).addTo(map);
state.markers.push(m);

const el=document.createElement("div");
el.className="card";

let tag="";

if(i.tags?.amenity==="toilets")tag+="<span class='tag g'>🚻</span>";
if(i.tags?.leisure==="park")tag+="<span class='tag g'>🌳</span>";
if(i.tags?.railway==="station")tag+="<span class='tag y'>🚉</span>";
if(i.tags?.religion==="shinto")tag+="<span class='tag b'>⛩</span>";
if(i.tags?.religion==="buddhist")tag+="<span class='tag b'>🛕</span>";
if(i.tags?.amenity==="vending_machine")tag+="<span class='tag b'>🥤</span>";
if(i.tags?.shop==="convenience")tag+="<span class='tag y'>🏪</span>";

el.innerHTML=`
<b>${i.tags?.name||"名称なし"}</b><br>
${tag}
`;

document.getElementById("list").appendChild(el);

});

setStatus("表示完了 "+items.length);
}

</script>

</body>
</html>
