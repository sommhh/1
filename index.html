<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場写真管理 完全版</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#111;
  color:#fff;
}

header{
  position:sticky;
  top:0;
  background:#000;
  padding:10px;
  z-index:10;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#0af;
  color:#fff;
}

input,select{
  padding:8px;
  margin:5px;
  width:95%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  padding:5px;
}

img{
  width:100%;
  border-radius:6px;
}

.small{
  font-size:12px;
}
</style>
</head>

<body>

<header>

<!-- 📸 撮影（最上部） -->
<input type="file" id="camera" accept="image/*" capture="environment" multiple>

<br>

<!-- 🏠 現場情報 -->
<input id="siteName" placeholder="現場名（編集可）">
<input id="address" placeholder="住所（編集可）">

<br>

<!-- 🏢 階層 -->
<select id="floor"></select>

<!-- 📝 定型 -->
<select id="type"></select>

<br>

<button onclick="savePhoto()">保存（連続OK）</button>
<button onclick="getGPS()">住所取得</button>

<br>

<button onclick="editTemplates()">定型編集</button>
<button onclick="editFloors()">階層編集</button>

<br>

<button onclick="printSelected()">印刷</button>
<button onclick="shareLine()">LINE共有</button>
<button onclick="shareMail()">メール</button>

</header>

<div id="photos" class="grid"></div>

<script>

// ===== 初期データ =====
let templates = JSON.parse(localStorage.getItem("templates")) || [
"施工前","施工後","配線","器具","検査","不具合","修正","材料","外観","その他"
];

let floors = JSON.parse(localStorage.getItem("floors")) || [
"1階","2階","屋上","地下","外部","その他"
];

let photos = JSON.parse(localStorage.getItem("photos")) || [];

let selected = [];

// ===== UI反映 =====
function loadUI(){
  let t = document.getElementById("type");
  t.innerHTML="";
  templates.forEach(v=>{
    let o=document.createElement("option");
    o.text=v;
    t.add(o);
  });

  let f = document.getElementById("floor");
  f.innerHTML="";
  floors.forEach(v=>{
    let o=document.createElement("option");
    o.text=v;
    f.add(o);
  });
}

loadUI();
render();


// ===== 保存（連続OK） =====
function savePhoto(){
  let files = document.getElementById("camera").files;
  if(!files.length) return;

  let reader = new FileReader();

  for(let i=0;i<files.length;i++){
    let file = files[i];

    reader.onload = function(e){
      photos.push({
        img:e.target.result,
        date:new Date().toLocaleString(),
        address:document.getElementById("address").value,
        site:document.getElementById("siteName").value,
        floor:document.getElementById("floor").value,
        type:document.getElementById("type").value
      });

      localStorage.setItem("photos",JSON.stringify(photos));
      render();
    };

    reader.readAsDataURL(file);
  }

  document.getElementById("camera").value="";
}


// ===== 表示 =====
function render(){
  let div = document.getElementById("photos");
  div.innerHTML="";

  photos.forEach((p,i)=>{

    let wrap=document.createElement("div");

    let img=document.createElement("img");
    img.src=p.img;

    img.onclick=()=>{
      if(selected.includes(i)){
        selected=selected.filter(v=>v!=i);
        wrap.style.border="";
      }else{
        selected.push(i);
        wrap.style.border="3px solid red";
      }
    };

    let text=document.createElement("div");
    text.className="small";
    text.innerHTML=
    p.floor+" / "+p.type+"<br>"+p.date;

    let del=document.createElement("button");
    del.innerText="削除";
    del.onclick=()=>{
      photos.splice(i,1);
      localStorage.setItem("photos",JSON.stringify(photos));
      render();
    };

    wrap.appendChild(img);
    wrap.appendChild(text);
    wrap.appendChild(del);

    div.appendChild(wrap);
  });
}


// ===== GPS（爆速版） =====
function getGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lon}`)
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("address").value =
      data.results.muniCd+" "+data.results.lv01Nm;
    });

  });
}


// ===== 印刷 =====
function printSelected(){
  let w = window.open("");

  selected.forEach(i=>{
    w.document.write(`<img src="${photos[i].img}" style="width:100%"><br>`);
  });

  w.print();
}


// ===== LINE共有 =====
function shareLine(){
  alert("LINEは画像直接共有不可（ブラウザ制限）→保存して送信して");
}


// ===== メール =====
function shareMail(){
  alert("メール添付はブラウザ制限あり→保存して添付して");
}


// ===== 定型編集 =====
function editTemplates(){
  let t = prompt("カンマ区切りで編集",templates.join(","));
  if(t){
    templates = t.split(",");
    localStorage.setItem("templates",JSON.stringify(templates));
    loadUI();
  }
}


// ===== 階層編集 =====
function editFloors(){
  let f = prompt("カンマ区切りで編集",floors.join(","));
  if(f){
    floors = f.split(",");
    localStorage.setItem("floors",JSON.stringify(floors));
    loadUI();
  }
}

</script>

</body>
</html>
