<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>現場写真ログ</title>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f7}

/* ヘッダー */
header{
  background:#007aff;color:#fff;padding:12px;text-align:center;font-size:18px
}

/* 上部（撮影・設定） */
.top{
  padding:10px;background:#fff;position:sticky;top:0;z-index:10
}
.cam{
  background:#007aff;color:#fff;padding:28px;text-align:center;
  font-size:20px;border-radius:12px;position:relative;margin-bottom:8px
}
.cam input{position:absolute;inset:0;opacity:0}

/* 入力 */
.row{display:flex;gap:6px;margin-bottom:6px}
.row > *{flex:1;padding:10px;font-size:15px}

/* ボタン */
.btn{width:100%;padding:12px;margin-top:6px;font-size:16px;border:none;border-radius:10px;background:#007aff;color:#fff}
.btn.gray{background:#8e8e93}

/* フォルダ */
.folder{margin:10px}
.fhdr{
  background:#fff;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer
}
.fname{font-size:14px;font-weight:bold}
.fgrid{
  display:none;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px
}
.folder.open .fgrid{display:grid}

/* 写真 */
.card{position:relative}
.card img{width:100%;border-radius:8px}
.label{
  position:absolute;bottom:0;width:100%;background:rgba(0,0,0,.6);
  color:#fff;font-size:10px;text-align:center
}
.sel{
  position:absolute;top:4px;left:4px;background:#0006;color:#fff;
  border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center
}
.card.selected .sel{background:#007aff}

/* 印刷 */
@media print{
  header,.top,.fhdr{display:none}
  .fgrid{display:grid!important;grid-template-columns:repeat(3,1fr)}
  .card{break-inside:avoid}
  .card:not(.print){display:none}
}
</style>
</head>

<body>

<header>📷 現場写真ログ</header>

<div class="top">

<!-- 撮影（最上部） -->
<div class="cam">
📷 撮影（連続）
<input type="file" accept="image/*" capture="environment" id="cam">
</div>

<div class="row">
<input id="site" placeholder="現場名">
<input id="addr" placeholder="住所">
</div>

<div class="row">
<select id="floor"></select>
<select id="tag"></select>
</div>

<div class="row">
<button class="btn gray" onclick="editFloor()">階層編集</button>
<button class="btn gray" onclick="editTag()">定型文編集</button>
</div>

<button class="btn" onclick="printSelected()">🖨 選択印刷</button>

</div>

<div id="folders"></div>

<script>

/* ===== 初期データ ===== */
let floors = JSON.parse(localStorage.getItem("floors")) || ["1階","2階","屋上","地下","外","A","B","C","D","E"];
let tags = JSON.parse(localStorage.getItem("tags")) || ["施工前","施工後","確認","異常なし","要修正","完了","配線","器具","注意","記録"];
let photos = JSON.parse(localStorage.getItem("photos")||"[]");
let selected = new Set();

/* ===== UI ===== */
function refreshUI(){
  floor.innerHTML = floors.map(v=>`<option>${v}</option>`).join("");
  tag.innerHTML = tags.map(v=>`<option>${v}</option>`).join("");
}
refreshUI();

/* ===== 編集（10個固定） ===== */
function editFloor(){
  let t = prompt("10個入力（カンマ区切り）", floors.join(","));
  if(!t) return;
  floors = t.split(",").slice(0,10);
  localStorage.setItem("floors",JSON.stringify(floors));
  refreshUI();
}
function editTag(){
  let t = prompt("10個入力（カンマ区切り）", tags.join(","));
  if(!t) return;
  tags = t.split(",").slice(0,10);
  localStorage.setItem("tags",JSON.stringify(tags));
  refreshUI();
}

/* ===== 保存 ===== */
cam.onchange = async e=>{
  const f = e.target.files[0];
  if(!f) return;

  const img = await comp(f);
  const d = new Date();
  const date = d.toISOString().slice(0,10);

  photos.push({
    id:Date.now(),
    img,
    site:site.value,
    addr:addr.value,
    floor:floor.value,
    tag:tag.value,
    date
  });

  localStorage.setItem("photos",JSON.stringify(photos));
  render();

  // 🔥 連続撮影
  e.target.value="";
};

/* ===== 圧縮 ===== */
function comp(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const i=new Image();
      i.onload=()=>{
        const c=document.createElement("canvas");
        const w=900,s=w/i.width;
        c.width=w;c.height=i.height*s;
        c.getContext("2d").drawImage(i,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.7));
      };
      i.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

/* ===== フォルダ分け ===== */
function key(p){
  return `${p.site}_${p.addr}_${p.date}_${p.floor}`;
}

/* ===== 描画 ===== */
function render(){
  const fwrap = document.getElementById("folders");
  fwrap.innerHTML="";

  const map={};
  photos.forEach(p=>{
    const k=key(p);
    if(!map[k]) map[k]=[];
    map[k].push(p);
  });

  Object.entries(map).forEach(([k,arr])=>{
    const box=document.createElement("div");
    box.className="folder open";

    box.innerHTML=`
    <div class="fhdr" onclick="this.parentNode.classList.toggle('open')">
      <div class="fname">${k}</div>
      <div>${arr.length}枚</div>
    </div>
    <div class="fgrid">
      ${arr.map(p=>`
      <div class="card ${selected.has(p.id)?'selected':''}" data-id="${p.id}" onclick="sel(event,${p.id})">
        <div class="sel">${selected.has(p.id)?'✓':''}</div>
        <img src="${p.img}">
        <div class="label">${p.floor} / ${p.tag}</div>
      </div>`).join("")}
    </div>
    `;
    fwrap.appendChild(box);
  });
}

/* ===== 選択 ===== */
function sel(e,id){
  e.stopPropagation();
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  render();
}

/* ===== 印刷 ===== */
function printSelected(){
  if(selected.size===0){alert("選択して");return;}

  document.querySelectorAll(".card").forEach(el=>{
    const id = parseInt(el.dataset.id);
    el.classList.toggle("print", selected.has(id));
  });

  window.print();

  setTimeout(()=>render(),300);
}

render();
</script>

</body>
</html>
