<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>写真ログ完成版</title>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f7}
header{background:#007aff;color:#fff;padding:14px;text-align:center;font-weight:bold}
.container{padding:10px}

button{padding:12px;border:none;border-radius:10px;background:#007aff;color:#fff;font-size:15px;margin:3px}
input,textarea,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ccc}

.big{font-size:18px;padding:18px}

.folder{background:#fff;margin:10px 0;padding:10px;border-radius:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:10px;padding:5px}
.card img{width:100%;border-radius:8px}

.small{font-size:11px;color:#666}

.sel{outline:3px solid #007aff}
</style>
</head>

<body>

<header>📷 写真ログ完成版</header>

<div class="container">

<input type="file" accept="image/*" capture="environment" id="file" class="big">

<select id="floorSel"></select>
<input id="floorFree" placeholder="自由入力（例：外構）">

<select id="tpl"></select>

<textarea id="memo" placeholder="メモ"></textarea>

<label><input type="checkbox" id="auto"> 連続撮影モード</label>

<button onclick="save()" class="big">保存</button>
<button onclick="share()">共有</button>
<button onclick="printSel()">選択印刷</button>

<div id="folders"></div>

</div>

<script>

const KEY="photo_final";

let floors=["1階","2階","3階","屋上"];
let tpls=["施工前","施工後","完了","問題なし","要対応"];

let selected=new Set();

function init(){
  let f=document.getElementById("floorSel");
  floors.forEach(v=>{
    let o=document.createElement("option");
    o.textContent=v;
    f.appendChild(o);
  });

  let t=document.getElementById("tpl");
  tpls.forEach(v=>{
    let o=document.createElement("option");
    o.textContent=v;
    t.appendChild(o);
  });
}

function load(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d))}

function resize(file){
  return new Promise(r=>{
    let fr=new FileReader();
    fr.onload=e=>{
      let img=new Image();
      img.onload=()=>{
        let c=document.createElement("canvas");
        let w=800;
        let s=w/img.width;
        c.width=w;
        c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        r(c.toDataURL("image/jpeg",0.7));
      };
      img.src=e.target.result;
    };
    fr.readAsDataURL(file);
  });
}

async function getGPS(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(p=>{
      res({lat:p.coords.latitude,lng:p.coords.longitude});
    },()=>res(null),{timeout:8000});
  });
}

async function getAddr(lat,lng){
  try{
    let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`);
    let j=await r.json();
    return j.display_name;
  }catch{return "住所不明"}
}

async function save(){
  let file=document.getElementById("file").files[0];
  if(!file)return alert("写真選択");

  let img=await resize(file);
  let gps=await getGPS();
  let addr="不明";

  if(gps) addr=await getAddr(gps.lat,gps.lng);

  let floor=document.getElementById("floorFree").value || document.getElementById("floorSel").value;

  let data=load();
  let today=new Date().toISOString().slice(0,10);

  let folder=addr+"_"+today+"_"+floor;

  data.push({
    id:Date.now(),
    img,
    memo:document.getElementById("memo").value || document.getElementById("tpl").value,
    floor,
    addr,
    day:today,
    folder
  });

  saveData(data);
  render();

  if(document.getElementById("auto").checked){
    document.getElementById("file").value="";
  }
}

function del(id){
  let d=load().filter(v=>v.id!==id);
  saveData(d);
  render();
}

function toggleSel(id,el){
  if(selected.has(id)){
    selected.delete(id);
    el.classList.remove("sel");
  }else{
    selected.add(id);
    el.classList.add("sel");
  }
}

function edit(v){
  let addr=prompt("住所",v.addr)||v.addr;
  let memo=prompt("メモ",v.memo)||v.memo;
  let day=prompt("日付",v.day)||v.day;

  let d=load();
  let p=d.find(x=>x.id===v.id);

  p.addr=addr;
  p.memo=memo;
  p.day=day;
  p.folder=addr+"_"+day+"_"+p.floor;

  saveData(d);
  render();
}

function render(){
  let data=load();
  let wrap=document.getElementById("folders");
  wrap.innerHTML="";

  let groups={};

  data.forEach(v=>{
    if(!groups[v.folder])groups[v.folder]=[];
    groups[v.folder].push(v);
  });

  Object.keys(groups).forEach(k=>{
    let box=document.createElement("div");
    box.className="folder";

    let rep=groups[k][0];

    box.innerHTML=`
      <b>${rep.addr}</b><br>
      <span class="small">${rep.day} / ${rep.floor}</span>
      <div class="grid"></div>
    `;

    let g=box.querySelector(".grid");

    groups[k].forEach(v=>{
      let c=document.createElement("div");
      c.className="card";

      c.innerHTML=`
        <img src="${v.img}">
        <div class="small">${v.memo}</div>
        <button onclick="del(${v.id})">削除</button>
        <button onclick='edit(${JSON.stringify(v)})'>編集</button>
      `;

      c.onclick=(e)=>{
        if(e.target.tagName==="BUTTON")return;
        toggleSel(v.id,c);
      };

      g.appendChild(c);
    });

    wrap.appendChild(box);
  });
}

function share(){
  let data=load();
  if(!data.length)return;

  let text="写真ログ";

  if(navigator.share){
    navigator.share({text});
  }else{
    location.href=`mailto:?body=${encodeURIComponent(text)}`;
  }
}

function printSel(){
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    let id=parseInt(c.querySelector("button").onclick.toString().match(/\d+/)[0]);
    c.style.display=selected.has(id)?"block":"none";
  });
  window.print();
  location.reload();
}

init();
render();

</script>

</body>
</html>
