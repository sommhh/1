<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>現場写真アプリ</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
header{position:sticky;top:0;background:#000;padding:10px;z-index:10}
button,input,select{margin:5px;padding:10px;border-radius:8px;border:none}
button{background:#0af;color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px}
img{width:100%;border-radius:6px}
.small{font-size:12px}
.sel{border:3px solid red}
</style>
</head>

<body>

<header>

<input type="file" id="cam" accept="image/*" capture="environment" multiple>

<br>

<input id="site" placeholder="現場名">
<input id="addr" placeholder="住所">

<br>

<select id="floor"></select>
<select id="type"></select>

<br>

<button onclick="gps()">GPS</button>
<button onclick="editFloor()">階層編集</button>
<button onclick="editType()">定型編集</button>

<br>

<button onclick="printSel()">印刷</button>
<button onclick="share()">共有</button>

</header>

<div id="list" class="grid"></div>

<script>

let floors = JSON.parse(localStorage.getItem("floors")||'["1階","2階","屋上"]');
let types = JSON.parse(localStorage.getItem("types")||'["施工前","施工後"]');
let photos = JSON.parse(localStorage.getItem("photos")||"[]");
let selected=[];

// UI
function loadUI(){
  let f=document.getElementById("floor");
  f.innerHTML="";
  floors.forEach(v=>{
    let o=document.createElement("option");o.text=v;f.add(o);
  });

  let t=document.getElementById("type");
  t.innerHTML="";
  types.forEach(v=>{
    let o=document.createElement("option");o.text=v;t.add(o);
  });
}
loadUI();

// 撮影→即保存（バグ対策済）
document.getElementById("cam").addEventListener("change",function(){

  let files=this.files;
  if(!files.length)return;

  let count=0;

  for(let i=0;i<files.length;i++){
    let reader=new FileReader();

    reader.onload=(e)=>{
      photos.push({
        img:e.target.result,
        date:new Date().toLocaleString(),
        site:site.value,
        addr:addr.value,
        floor:floor.value,
        type:type.value
      });

      count++;
      if(count===files.length){
        localStorage.setItem("photos",JSON.stringify(photos));
        render();
      }
    };

    reader.readAsDataURL(files[i]);
  }

  this.value="";
});

// 表示
function render(){
  let d=document.getElementById("list");
  d.innerHTML="";

  photos.forEach((p,i)=>{

    let w=document.createElement("div");

    let img=document.createElement("img");
    img.src=p.img;

    img.onclick=()=>{
      if(selected.includes(i)){
        selected=selected.filter(v=>v!=i);
        w.classList.remove("sel");
      }else{
        selected.push(i);
        w.classList.add("sel");
      }
    };

    let txt=document.createElement("div");
    txt.className="small";
    txt.innerHTML=p.floor+" / "+p.type+"<br>"+p.date;

    let del=document.createElement("button");
    del.innerText="削除";
    del.onclick=()=>{
      photos.splice(i,1);
      localStorage.setItem("photos",JSON.stringify(photos));
      render();
    };

    w.appendChild(img);
    w.appendChild(txt);
    w.appendChild(del);

    d.appendChild(w);
  });
}
render();

// 爆速GPS
function gps(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lon}`)
    .then(r=>r.json())
    .then(d=>{
      addr.value=d.results.lv01Nm;
    });
  });
}

// 印刷
function printSel(){
  let w=window.open("");
  selected.forEach(i=>{
    w.document.write(`<img src="${photos[i].img}" style="width:100%">`);
  });
  w.print();
}

// 共有（スマホ標準）
function share(){
  if(!navigator.share){alert("共有未対応");return;}

  navigator.share({
    title:"写真",
    text:"現場写真",
    url:location.href
  });
}

// 編集
function editFloor(){
  let f=prompt("階層編集(カンマ)",floors.join(","));
  if(f){
    floors=f.split(",");
    localStorage.setItem("floors",JSON.stringify(floors));
    loadUI();
  }
}

function editType(){
  let t=prompt("定型編集(カンマ)",types.join(","));
  if(t){
    types=t.split(",");
    localStorage.setItem("types",JSON.stringify(types));
    loadUI();
  }
}

</script>
</body>
</html>
