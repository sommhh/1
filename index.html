<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場写真</title>

<style>
body{margin:0;font-family:sans-serif;background:#eee;}
header{position:fixed;top:0;width:100%;background:#000;color:#fff;padding:10px;z-index:10;}
main{margin-top:80px;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
img{width:100%;height:90px;object-fit:cover;}
button{margin:5px;padding:8px;}
select,input{margin:5px;padding:5px;width:100%;}
</style>

</head>
<body>

<header>
📸 撮影
<input type="file" id="cam" accept="image/*" capture="environment" multiple>
</header>

<main>

<select id="floor"></select>
<select id="type"></select>

<input id="addr" placeholder="住所編集OK">

<button onclick="printData()">印刷</button>
<button onclick="share()">共有</button>

<div class="grid" id="list"></div>

</main>

<script>

// ===== 初期化 =====
let db;
try{
 db = JSON.parse(localStorage.getItem("db")) || [];
}catch{
 db=[];
}

// ===== 定型 =====
let floors = JSON.parse(localStorage.getItem("floors")||'["1階","2階"]');
let types = JSON.parse(localStorage.getItem("types")||'["施工前","施工後"]');

// ===== UI =====
const floorSel=document.getElementById("floor");
const typeSel=document.getElementById("type");

function loadSel(){
 floorSel.innerHTML="";
 typeSel.innerHTML="";

 floors.forEach(v=>{
  let o=document.createElement("option");
  o.textContent=v;
  floorSel.appendChild(o);
 });

 types.forEach(v=>{
  let o=document.createElement("option");
  o.textContent=v;
  typeSel.appendChild(o);
 });
}
loadSel();

// ===== 保存 =====
function save(){
 localStorage.setItem("db",JSON.stringify(db));
}

// ===== 撮影 =====
document.getElementById("cam").addEventListener("change",e=>{
 const files=[...e.target.files];
 if(!files.length)return;

 files.forEach(file=>{
  const fr=new FileReader();
  fr.onload=()=>{
   db.push({
    img:fr.result,
    f:floorSel.value,
    t:typeSel.value,
    d:new Date().toLocaleString(),
    a:document.getElementById("addr").value
   });
   render();
   save();
  };
  fr.readAsDataURL(file);
 });
});

// ===== 表示 =====
function render(){
 const list=document.getElementById("list");
 list.innerHTML="";

 db.forEach((p,i)=>{
  const div=document.createElement("div");

  div.innerHTML=`
   <img src="${p.img}">
   <small>${p.f} ${p.t}</small><br>
   <small>${p.d}</small><br>
   <small contenteditable onblur="edit(${i},this.innerText)">${p.a||""}</small><br>
   <button onclick="del(${i})">削除</button>
  `;

  list.appendChild(div);
 });
}

// ===== 編集 =====
function edit(i,val){
 db[i].a=val;
 save();
}

// ===== 削除 =====
function del(i){
 db.splice(i,1);
 save();
 render();
}

// ===== 印刷 =====
function printData(){
 let w=window.open("");
 let html="";
 db.forEach(p=>{
  html+=`<img src="${p.img}" style="width:100%">`;
 });
 w.document.write(html);
 w.print();
}

// ===== 共有 =====
function share(){
 if(navigator.share){
  navigator.share({title:"写真"});
 }else{
  alert("共有未対応");
 }
}

// ===== GPS =====
navigator.geolocation.getCurrentPosition(pos=>{
 document.getElementById("addr").value=
 pos.coords.latitude+","+pos.coords.longitude;
},{enableHighAccuracy:true});

render();

</script>

</body>
</html>
