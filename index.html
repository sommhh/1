<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場写真アプリ 完全版</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#111;
  color:#fff;
  padding:10px;
  text-align:center;
}

.top{
  position:sticky;
  top:0;
  background:#fff;
  padding:10px;
  z-index:999;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:#fff;
  font-size:14px;
}

select,input{
  padding:8px;
  margin:5px;
  width:90%;
}

#photos{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  padding:10px;
}

img{
  width:100%;
  border-radius:6px;
}
</style>
</head>

<body>

<header>現場写真 完全版</header>

<div class="top">

<input id="siteName" placeholder="現場名">
<input id="address" placeholder="住所（編集可）">

<select id="floor"></select>
<select id="type"></select>

<button onclick="getLocation()">📍住所取得</button>
<button onclick="editMaster()">⚙️項目編集</button>
<br>
<button onclick="startCamera()">📷撮影（連続）</button>

</div>

<input type="file" id="camera" accept="image/*" capture="environment" style="display:none">

<div id="photos"></div>

<div style="padding:10px;">
<button onclick="printPhotos()">🖨印刷</button>
<button onclick="share()">📤共有</button>
</div>

<script>

let photos=[]

/* ---------- 初期データ ---------- */
let floors = JSON.parse(localStorage.getItem("floors")) || ["1階","2階","屋上"]
let types = JSON.parse(localStorage.getItem("types")) || ["施工前","施工中","施工後"]

function loadSelect(){
  floor.innerHTML=""
  type.innerHTML=""
  floors.forEach(f=>floor.innerHTML+=`<option>${f}</option>`)
  types.forEach(t=>type.innerHTML+=`<option>${t}</option>`)
}
loadSelect()

/* ---------- GPS ---------- */
function getLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    let lat=pos.coords.latitude
    let lon=pos.coords.longitude

    let url=`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
    let res=await fetch(url)
    let data=await res.json()

    address.value=data.display_name
  })
}

/* ---------- カメラ ---------- */
function startCamera(){
  camera.click()
}

camera.addEventListener("change",e=>{
  let file=e.target.files[0]
  if(!file)return

  let reader=new FileReader()
  reader.onload=()=>{
    savePhoto(reader.result)
  }
  reader.readAsDataURL(file)

  camera.value=""  // ←連続撮影OK
})

/* ---------- 保存 ---------- */
function savePhoto(src){

  let data={
    img:src,
    floor:floor.value,
    type:type.value,
    site:siteName.value,
    addr:address.value,
    date:new Date().toLocaleString()
  }

  photos.push(data)
  render()
}

/* ---------- 表示 ---------- */
function render(){

  photosDiv.innerHTML=""

  photos.forEach((p,i)=>{

    let box=document.createElement("div")

    box.innerHTML=`
    <img src="${p.img}">
    <div style="font-size:10px">
    ${p.floor}/${p.type}
    </div>
    <button onclick="del(${i})">削除</button>
    `

    photosDiv.appendChild(box)
  })
}

/* ---------- 削除 ---------- */
function del(i){
  photos.splice(i,1)
  render()
}

/* ---------- 編集 ---------- */
function editMaster(){

  let f=prompt("階層をカンマ区切りで",floors.join(","))
  let t=prompt("種別をカンマ区切りで",types.join(","))

  if(f){
    floors=f.split(",")
    localStorage.setItem("floors",JSON.stringify(floors))
  }
  if(t){
    types=t.split(",")
    localStorage.setItem("types",JSON.stringify(types))
  }

  loadSelect()
}

/* ---------- 印刷 ---------- */
function printPhotos(){

  let w=window.open("")

  let html=""
  photos.forEach(p=>{
    html+=`<img src="${p.img}" style="width:100%"><br>${p.floor}-${p.type}<hr>`
  })

  w.document.write(html)
  w.print()
}

/* ---------- 共有 ---------- */
function share(){

  if(!navigator.share){
    alert("共有非対応")
    return
  }

  navigator.share({
    title:"現場写真",
    text:"現場写真共有"
  })
}

</script>

</body>
</html>
