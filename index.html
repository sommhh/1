<style>
/* ══ VARIABLES ══ */
:root {
  --bg:      #f4f6f9;
  --surface: #ffffff;
  --panel:   #ffffff;
  --border:  #d0d7e2;
  --accent:  #e08800;
  --red:     #d93025;
  --green:   #1a8a3a;
  --blue:    #1a6fc4;
  --text:    #1a2030;
  --muted:   #5a6580;
  --c-toilet:  #1a6fc4;
  --c-drink:   #1a8a3a;
  --c-parking: #c07000;
  --r: 10px;
  --header-h: 110px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:'Noto Sans JP',sans-serif; }
 
/* ══ LOADING ══ */
#loading {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  transition:opacity .5s;
}
#loading.hide { opacity:0; pointer-events:none; }
#loading-logo { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:4px; color:var(--accent); }
#loading-sub  { font-size:13px; color:var(--muted); }
.spinner { width:30px; height:30px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--accent);
  animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
 
/* ══ HEADER ══ */
#header {
  position:fixed; top:0; left:0; right:0; z-index:500;
  background:var(--bg); border-bottom:2px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  padding:10px 12px 8px;
  display:flex; flex-direction:column; gap:8px;
}
#title-row { display:flex; align-items:center; gap:8px; }
#app-title  { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px;
  color:var(--accent); line-height:1; }
 
#gps-badge {
  margin-left:auto;
  font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;
  background:var(--surface); border:1px solid var(--border); color:var(--muted);
  white-space:nowrap; transition:color .3s,border-color .3s;
}
#gps-badge.ok  { color:var(--green); border-color:var(--green); }
#gps-badge.err { color:var(--red);   border-color:var(--red); }
 
/* ══ MODE BUTTONS ══ */
#mode-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
 
.mode-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; padding:10px 4px;
  border-radius:var(--r); border:2px solid var(--border);
  background:var(--surface); cursor:pointer;
  transition:transform .1s, background .15s, box-shadow .15s;
  -webkit-user-select:none; user-select:none; position:relative; overflow:hidden;
}
.mode-btn:active { transform:scale(.94); }
.mode-btn .icon  { font-size:22px; line-height:1; }
.mode-btn .label { font-size:10px; font-weight:700; letter-spacing:.5px; color:var(--muted); transition:color .15s; }
 
.mode-btn.toilet  { border-color:var(--c-toilet);  }
.mode-btn.toilet  .label { color:var(--c-toilet); }
.mode-btn.drink   { border-color:var(--c-drink);   }
.mode-btn.drink   .label { color:var(--c-drink); }
.mode-btn.parking { border-color:var(--c-parking); }
.mode-btn.parking .label { color:var(--c-parking); }
 
.mode-btn.active.toilet  { background:rgba(88,166,255,.15); box-shadow:0 0 14px rgba(88,166,255,.35); }
.mode-btn.active.drink   { background:rgba(63,185,80,.15);  box-shadow:0 0 14px rgba(63,185,80,.35); }
.mode-btn.active.parking { background:rgba(240,165,0,.15);  box-shadow:0 0 14px rgba(240,165,0,.35); }
.mode-btn.loading { opacity:.55; pointer-events:none; }
 
/* ── pulse ring on active ── */
.mode-btn.active::after {
  content:''; position:absolute; inset:-2px; border-radius:inherit;
  border:2px solid currentColor; opacity:.4;
  animation:pulse-ring 1.4s ease-out infinite;
}
.mode-btn.active.toilet::after  { color:var(--c-toilet); }
.mode-btn.active.drink::after   { color:var(--c-drink); }
.mode-btn.active.parking::after { color:var(--c-parking); }
@keyframes pulse-ring { 0%{opacity:.4;transform:scale(1)} 100%{opacity:0;transform:scale(1.08)} }
 
/* ══ MAP ══ */
#map { position:fixed; left:0; right:0; bottom:0; z-index:1; top:var(--header-h); }
 
/* ══ MY-LOC BUTTON ══ */
#my-loc-btn {
  position:fixed; right:14px; z-index:400;
  width:44px; height:44px; border-radius:50%;
  background:var(--panel); border:2px solid var(--border);
  font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.45);
  transition:transform .1s;
}
#my-loc-btn:active { transform:scale(.9); }
 
/* ══ PANEL ══ */
#panel {
  position:fixed; bottom:0; left:0; right:0; z-index:800;
  max-height:55vh; min-height:100px;
  background:var(--panel); border-top:2px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
}
#panel.open { transform:translateY(0); }
 
#panel-handle { width:40px; height:4px; border-radius:2px;
  background:var(--border); margin:10px auto 4px; flex-shrink:0; }
#panel-header { padding:0 14px 8px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#panel-title { font-size:13px; font-weight:700; color:var(--muted); letter-spacing:.8px; }
#panel-count { font-size:12px; color:var(--muted); }
 
#result-list { overflow-y:auto; flex:1; padding:0 10px 24px;
  -webkit-overflow-scrolling:touch; }
 
/* ══ RESULT CARD ══ */
.result-card {
  display:flex; align-items:stretch;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); margin-bottom:8px; overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
  transition:border-color .15s;
  animation:card-in .18s ease both;
}
@keyframes card-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.result-card:last-child { margin-bottom:0; }
.result-card:nth-child(1)  { animation-delay:.02s }
.result-card:nth-child(2)  { animation-delay:.04s }
.result-card:nth-child(3)  { animation-delay:.06s }
.result-card:nth-child(4)  { animation-delay:.08s }
.result-card:nth-child(5)  { animation-delay:.10s }
 
.card-accent { width:4px; flex-shrink:0; }
.toilet-card  .card-accent { background:var(--c-toilet); }
.drink-card   .card-accent { background:var(--c-drink); }
.parking-card .card-accent { background:var(--c-parking); }
 
.card-body { flex:1; padding:10px 8px; display:flex; flex-direction:column; gap:4px; min-width:0; cursor:pointer; }
.card-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-sub  { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
 
.badge { font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; white-space:nowrap; }
.badge-withdrink { background:rgba(63,185,80,.2);  color:var(--green);  border:1px solid var(--green); }
.badge-coke      { background:rgba(227,77,77,.15); color:var(--red);    border:1px solid var(--red); }
.badge-dydo      { background:rgba(88,166,255,.15);color:var(--blue);   border:1px solid var(--blue); }
.badge-near      { background:rgba(63,185,80,.2);  color:var(--green);  border:1px solid var(--green); }
 
.card-actions { padding:8px 8px 8px 0;
  display:flex; flex-direction:column; gap:5px; justify-content:center; }
.btn-route, .btn-line {
  font-size:10px; font-weight:700; padding:5px 7px; border-radius:6px;
  border:none; cursor:pointer; white-space:nowrap;
  display:flex; align-items:center; gap:2px; font-family:inherit;
  transition:opacity .12s;
}
.btn-route:active, .btn-line:active { opacity:.65; }
.btn-route { background:var(--accent); color:#000; }
.btn-line  { background:#06c755;       color:#fff; }
 
/* ══ TOAST ══ */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(16px);
  z-index:9000; background:rgba(26,32,48,.92);
  border-radius:20px;
  padding:8px 20px; font-size:12px; font-weight:700; color:#fff;
  opacity:0; transition:opacity .25s, transform .25s;
  pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
 
/* ══ RETRY BANNER ══ */
#retry-banner {
  display:none; position:fixed; bottom:70px; left:50%;
  transform:translateX(-50%); z-index:9000;
  background:var(--red); border-radius:8px;
  padding:8px 16px; font-size:12px; font-weight:700; color:#fff;
  cursor:pointer; white-space:nowrap;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}
#retry-banner.show { display:block; }
 
/* ══ LEAFLET OVERRIDES ══ */
.leaflet-popup-content-wrapper {
  background:var(--surface) !important; color:var(--text) !important;
  border:1px solid var(--border) !important; border-radius:var(--r) !important;
  box-shadow:0 4px 16px rgba(0,0,0,.15) !important;
}
.leaflet-popup-tip { background:var(--surface) !important; }
.leaflet-popup-content { font-family:'Noto Sans JP',sans-serif; font-size:12px; margin:10px 12px !important; }
.leaflet-popup-content a { color:var(--accent) !important; }
.leaflet-control-zoom a { background:var(--surface) !important; color:var(--text) !important; border-color:var(--border) !important; }
</style>

<!-- LOADING SCREEN -->
<div id="loading">
  <div id="loading-logo">現場MAP</div>
  <div class="spinner"></div>
  <div id="loading-sub">GPS取得中...</div>
</div>
 
<!-- HEADER -->
<div id="header">
  <div id="title-row">
    <div id="app-title">⚡ 現場MAP</div>
    <div id="gps-badge">📡 GPS待機</div>
  </div>
  <div id="mode-bar">
    <button class="mode-btn toilet"  id="btn-toilet"  onclick="activateMode('toilet')">
      <span class="icon">🚻</span><span class="label">トイレ</span>
    </button>
    <button class="mode-btn drink"   id="btn-drink"   onclick="activateMode('drink')">
      <span class="icon">🥤</span><span class="label">DRINK</span>
    </button>
    <button class="mode-btn parking" id="btn-parking" onclick="activateMode('parking')">
      <span class="icon">🅿️</span><span class="label">駐車場</span>
    </button>
  </div>
</div>
 
<!-- MAP -->
<div id="map"></div>
 
<!-- MY-LOC -->
<button id="my-loc-btn" onclick="flyToMe()" aria-label="現在地へ">📍</button>
 
<!-- RESULT PANEL -->
<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-header">
    <div id="panel-title">検索結果</div>
    <div id="panel-count"></div>
  </div>
  <div id="result-list"></div>
</div>
 
<!-- TOAST / RETRY -->
<div id="toast"></div>
<div id="retry-banner" onclick="retryLastSearch()">⚠ 取得失敗 — タップして再試行</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════════════
const SEARCH_RADIUS  = 500;   // m
const MAX_RESULTS    = 15;
const DRINK_NEAR_M   = 60;    // トイレ×DRINK近接判定
const GPS_THROTTLE   = 4000;  // ms
const CACHE_TTL      = 5 * 60 * 1000; // 5 min
const OVERPASS_URL   = 'https://overpass-api.de/api/interpreter';
const OVERPASS_TMO   = 15;    // sec
 
// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
const state = {
  lat: null, lon: null,
  gpsOk: false,
  mode: null,
  searching: false,
  markers: [],
  results: [],
  // [BUG FIX 1] 全自販機ノード常時キャッシュ（初回DRINK取得後に保持）
  _drinkNodesCache: null,
  _drinkNodesCacheKey: null,
  _lastSearchMode: null,
};
 
// ══════════════════════════════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════════════════════════════
const map = L.map('map', { zoomControl:false, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { maxZoom:19, subdomains:'abcd' }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);
 
// 現在地共有ボタン（Leafletコントロール）
const shareCtrl = L.control({ position:'bottomleft' });
shareCtrl.onAdd = () => {
  const d = document.createElement('div');
  d.innerHTML = `<button onclick="shareCurrent()" style="
    background:#06c755;color:#fff;border:none;border-radius:8px;
    padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:5px;
    box-shadow:0 2px 10px rgba(0,0,0,.4);">📤 LINE共有</button>`;
  return d;
};
shareCtrl.addTo(map);
 
// ヘッダー高さ対応
function adjustLayout() {
  const h = document.getElementById('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
  document.getElementById('my-loc-btn').style.top = (h + 10) + 'px';
}
 
// ══════════════════════════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════════════════════════
let _lastGpsTs  = 0;
let myMarker    = null;
let myCircle    = null;
 
function startGPS() {
  if (!navigator.geolocation) { showToast('GPS非対応ブラウザです'); return; }
  navigator.geolocation.watchPosition(onGPS, onGPSErr,
    { enableHighAccuracy:true, maximumAge:5000, timeout:12000 });
}
 
function onGPS(pos) {
  const now = Date.now();
  if (now - _lastGpsTs < GPS_THROTTLE) return;
  _lastGpsTs = now;
  state.lat = pos.coords.latitude;
  state.lon = pos.coords.longitude;
  state.gpsOk = true;
 
  const badge = document.getElementById('gps-badge');
  badge.textContent = '📡 GPS OK';
  badge.className   = 'ok';
 
  const ll = [state.lat, state.lon];
  if (!myMarker) {
    myMarker = L.circleMarker(ll, {
      radius:9, color:'#fff', weight:3, fillColor:'#1a6fc4', fillOpacity:1,
    }).addTo(map).bindPopup('<b>現在地</b>');
    myCircle = L.circle(ll, {
      radius:SEARCH_RADIUS, color:'#1a6fc4',
      fillColor:'#1a6fc4', fillOpacity:.06, weight:1.5, dashArray:'5 5',
    }).addTo(map);
    map.setView(ll, 16);
    document.getElementById('loading').classList.add('hide');
  } else {
    myMarker.setLatLng(ll);
    myCircle.setLatLng(ll);
  }
}
 
function onGPSErr() {
  const badge = document.getElementById('gps-badge');
  badge.textContent = '❌ GPS失敗'; badge.className = 'err';
  document.getElementById('loading-sub').textContent = '位置情報を許可してください';
  showToast('GPS取得失敗 — 設定から位置情報を許可してください', 4000);
}
 
function flyToMe() {
  if (!state.gpsOk) { showToast('GPS未取得'); return; }
  map.flyTo([state.lat, state.lon], 16, { duration:.7 });
}
 
// ══════════════════════════════════════════════════════════════════
//  MODE ACTIVATION
// ══════════════════════════════════════════════════════════════════
async function activateMode(mode) {
  if (state.searching) { showToast('検索中です...'); return; }
  if (!state.gpsOk)    { showToast('GPS取得中... 少し待ってください'); return; }
 
  // 同じモード再タップ → 解除
  if (state.mode === mode) {
    state.mode = null;
    resetModeUI();
    closePanel();
    clearMarkers();
    return;
  }
 
  state.mode = mode;
  resetModeUI();
  document.getElementById('btn-' + mode).classList.add('active');
  state._lastSearchMode = mode;
 
  await runSearch(mode);
}
 
function resetModeUI() {
  ['toilet','drink','parking'].forEach(m =>
    document.getElementById('btn-' + m).classList.remove('active','loading'));
}
 
// ══════════════════════════════════════════════════════════════════
//  SEARCH ORCHESTRATOR
//  [BUG FIX 1] トイレモード時、_drinkNodesCacheが空なら自販機を先行取得
// ══════════════════════════════════════════════════════════════════
async function runSearch(mode) {
  state.searching = true;
  const btn = document.getElementById('btn-' + mode);
  btn.classList.add('loading');
  hideRetryBanner();
  showToast('検索中...');
 
  try {
    // トイレモードで自販機キャッシュが未取得/旧位置なら先行フェッチ
    if (mode === 'toilet') {
      const drinkKey = makeCacheKey('drink');
      if (state._drinkNodesCacheKey !== drinkKey) {
        await prefetchDrinkNodes(drinkKey);
      }
    }
 
    const cacheKey = makeCacheKey(mode);
    let results = getCache(cacheKey);
 
    if (!results) {
      const raw = await fetchOverpassWithRetry(buildQuery(mode));
      results   = processResults(raw, mode);
      setCache(cacheKey, results);
    }
 
    // [BUG FIX 2] DRINKモード取得後は必ずキャッシュ更新
    if (mode === 'drink') {
      const drinkKey = makeCacheKey('drink');
      // _drinkNodesCache は全ノード（スコア0含む）を保持
      const raw2 = await fetchOverpassWithRetry(buildDrinkAllQuery());
      state._drinkNodesCache    = parseNodes(raw2);
      state._drinkNodesCacheKey = drinkKey;
    }
 
    state.results = results;
    renderResults(results, mode);
    renderMarkers(results, mode);
    openPanel();
    showToast(`${results.length}件見つかりました`);
  } catch (err) {
    console.error(err);
    showToast('取得失敗');
    showRetryBanner();
  } finally {
    state.searching = false;
    btn.classList.remove('loading');
  }
}
 
// DRINK先行フェッチ（トイレ検索前にサイレント実行）
async function prefetchDrinkNodes(drinkKey) {
  try {
    const raw = await fetchOverpassWithRetry(buildDrinkAllQuery(), /*silent=*/true);
    state._drinkNodesCache    = parseNodes(raw);
    state._drinkNodesCacheKey = drinkKey;
  } catch (_) {
    // サイレント失敗。紐付けなしで続行
    state._drinkNodesCache    = [];
    state._drinkNodesCacheKey = drinkKey;
  }
}
 
function retryLastSearch() {
  if (!state._lastSearchMode) return;
  hideRetryBanner();
  activateMode(state._lastSearchMode);
}
 
// ══════════════════════════════════════════════════════════════════
//  OVERPASS QUERY BUILDERS
// ══════════════════════════════════════════════════════════════════
function buildQuery(mode) {
  const { lat, lon } = state;
  const r = SEARCH_RADIUS;
 
  if (mode === 'toilet') return `[out:json][timeout:${OVERPASS_TMO}];
(
  node["amenity"="toilets"]["access"!="private"]["access"!="customers"](around:${r},${lat},${lon});
);
out body;`;
 
  if (mode === 'drink') return `[out:json][timeout:${OVERPASS_TMO}];
(
  node["amenity"="vending_machine"]["vending"="drinks"](around:${r},${lat},${lon});
  node["amenity"="vending_machine"]["vending"="beverages"](around:${r},${lat},${lon});
  node["amenity"="vending_machine"](around:${r},${lat},${lon});
);
out body;`;
 
  if (mode === 'parking') return `[out:json][timeout:${OVERPASS_TMO}];
(
  node["amenity"="parking"](around:${r},${lat},${lon});
  way["amenity"="parking"](around:${r},${lat},${lon});
);
out center body;`;
}
 
// 自販機全件クエリ（DRINK紐付け用・スコアフィルタなし）
function buildDrinkAllQuery() {
  const { lat, lon } = state;
  return `[out:json][timeout:${OVERPASS_TMO}];
(
  node["amenity"="vending_machine"](around:${DRINK_NEAR_M + SEARCH_RADIUS},${lat},${lon});
);
out body;`;
}
 
// ══════════════════════════════════════════════════════════════════
//  OVERPASS FETCH + RETRY
//  [BUG FIX 3] 失敗時に1回リトライ
// ══════════════════════════════════════════════════════════════════
async function fetchOverpassWithRetry(query, silent=false) {
  const doFetch = () => fetch(OVERPASS_URL, {
    method:'POST',
    headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
    body:'data=' + encodeURIComponent(query),
  });
 
  let resp;
  try {
    resp = await doFetch();
  } catch (e) {
    if (!silent) showToast('ネットワークエラー — 再試行中...');
    // 2秒待って1回リトライ
    await sleep(2000);
    resp = await doFetch();
  }
 
  if (!resp.ok) {
    // HTTPエラーでも1回リトライ
    await sleep(1500);
    resp = await doFetch();
    if (!resp.ok) throw new Error(`Overpass HTTP ${resp.status}`);
  }
  return resp.json();
}
 
// ══════════════════════════════════════════════════════════════════
//  PROCESS RESULTS
// ══════════════════════════════════════════════════════════════════
function parseNodes(data) {
  return (data.elements || []).map(el => {
    const lat = el.lat ?? el.center?.lat;
    const lon = el.lon ?? el.center?.lon;
    if (lat == null || lon == null) return null;
    return { ...el, lat, lon };
  }).filter(Boolean);
}
 
function processResults(data, mode) {
  let nodes = parseNodes(data).map(n => ({
    ...n,
    _dist: haversine(state.lat, state.lon, n.lat, n.lon),
  }));
 
  if (mode === 'toilet') {
    // ホテル除外
    nodes = nodes.filter(n => {
      const s = ((n.tags?.name || '') + (n.tags?.operator || '')).toLowerCase();
      return !/(hotel|ホテル|旅館|inn)/i.test(s);
    });
 
    // DRINK近接紐付け
    // [BUG FIX 1] _drinkNodesCache は必ず配列（prefetchDrinkNodes保証）
    const drinkPool = state._drinkNodesCache || [];
    nodes = nodes.map(n => {
      const near = drinkPool.filter(d =>
        haversine(n.lat, n.lon, d.lat, d.lon) <= DRINK_NEAR_M
      );
      n._drink = near.length > 0
        ? near.sort((a,b) => scoreVM(b) - scoreVM(a))[0]
        : null;
      return n;
    });
  }
 
  if (mode === 'drink') {
    nodes = nodes
      .map(n => { n._score = scoreVM(n); return n; })
      .filter(n => n._score > 0)
      .sort((a,b) => b._score - a._score || a._dist - b._dist);
  } else {
    nodes.sort((a,b) => a._dist - b._dist);
  }
 
  return nodes.slice(0, MAX_RESULTS);
}
 
// DRINK スコアリング
function scoreVM(n) {
  const tags = n.tags || {};
  const s = [tags.name, tags.operator, tags.brand].filter(Boolean).join(' ').toLowerCase();
  if (/with[\s_-]*drink/i.test(s)) return 10;
  if (/coke|coca/i.test(s))        return 3;
  if (/dydo/i.test(s))             return 3;
  if (tags.vending === 'drinks' || tags.vending === 'beverages') return 2;
  if (tags.amenity === 'vending_machine') return 1;
  return 0;
}
 
// ══════════════════════════════════════════════════════════════════
//  RENDER — LIST
// ══════════════════════════════════════════════════════════════════
const MODE_LABEL = { toilet:'🚻 トイレ', drink:'🥤 DRINK', parking:'🅿️ 駐車場' };
 
function renderResults(results, mode) {
  const list  = document.getElementById('result-list');
  const title = document.getElementById('panel-title');
  const count = document.getElementById('panel-count');
  title.textContent = MODE_LABEL[mode];
  count.textContent = results.length + '件';
 
  list.innerHTML = '';
  if (!results.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:28px 0;font-size:13px;">付近に見つかりませんでした</div>';
    return;
  }
 
  results.forEach((item, i) => {
    const name  = resolveName(item, mode, i);
    const dist  = fmtDist(item._dist);
    const badge = buildBadge(item, mode);
 
    const card  = document.createElement('div');
    card.className = `result-card ${mode}-card`;
    card.style.animationDelay = (i * 0.03) + 's';
 
    card.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-name">${esc(name)}</div>
        <div class="card-sub">${dist}${badge}</div>
      </div>
      <div class="card-actions">
        <button class="btn-route" onclick="openRoute(${item.lat},${item.lon})">🗺 ルート</button>
        <button class="btn-line"  onclick="shareLine(${item.lat},${item.lon},'${esca(name)}')">LINE</button>
      </div>`;
 
    card.querySelector('.card-body').addEventListener('click', () => {
      map.flyTo([item.lat, item.lon], 18, { duration:.5 });
      closePanel();
    });
 
    list.appendChild(card);
  });
}
 
function resolveName(item, mode, i) {
  const t = item.tags || {};
  return t.name || t.operator || t.brand ||
    { toilet:'トイレ', drink:'自販機', parking:'駐車場' }[mode] + ` #${i+1}`;
}
 
function fmtDist(m) {
  if (!isFinite(m)) return '';
  return m < 1000
    ? `<span style="color:var(--muted)">${Math.round(m)}m</span>`
    : `<span style="color:var(--muted)">${(m/1000).toFixed(1)}km</span>`;
}
 
function buildBadge(item, mode) {
  if (mode === 'drink') {
    const s = item._score;
    if (s >= 10) return ' <span class="badge badge-withdrink">WITH DRINK</span>';
    const str = JSON.stringify(item.tags || '').toLowerCase();
    if (/coke|coca/.test(str)) return ' <span class="badge badge-coke">Coke ON</span>';
    if (/dydo/.test(str))      return ' <span class="badge badge-dydo">DyDo</span>';
  }
  if (mode === 'toilet' && item._drink) {
    return ' <span class="badge badge-near">🥤 DRINK近接</span>';
  }
  return '';
}
 
// ══════════════════════════════════════════════════════════════════
//  RENDER — MARKERS
// ══════════════════════════════════════════════════════════════════
const MARKER_COLORS = { toilet:'#58a6ff', drink:'#3fb950', parking:'#f0a500' };
const MARKER_EMOJI  = { toilet:'🚻',      drink:'🥤',      parking:'🅿️' };
 
function renderMarkers(results, mode) {
  clearMarkers();
  const col   = MARKER_COLORS[mode];
  const emoji = MARKER_EMOJI[mode];
 
  results.forEach((item, i) => {
    const isTop = i === 0;
    const icon = L.divIcon({
      className:'',
      html:`<div style="
        width:${isTop?38:32}px;height:${isTop?38:32}px;border-radius:50%;
        background:${col};border:${isTop?3:2}px solid #fff;
        display:flex;align-items:center;justify-content:center;
        font-size:${isTop?17:14}px;
        box-shadow:0 2px ${isTop?12:6}px rgba(0,0,0,.55);
      ">${emoji}</div>`,
      iconSize:[isTop?38:32,isTop?38:32],
      iconAnchor:[isTop?19:16,isTop?19:16],
    });
 
    const name = resolveName(item, mode, i);
    const popup = `<b>${esc(name)}</b><br>
      <small style="color:var(--muted)">${Math.round(item._dist)}m</small><br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}"
         target="_blank">🗺 ルートを開く</a>`;
 
    const m = L.marker([item.lat, item.lon], { icon }).addTo(map).bindPopup(popup);
    state.markers.push(m);
  });
 
  // 最近接を自動ポップアップ
  if (state.markers.length) state.markers[0].openPopup();
}
 
function clearMarkers() {
  state.markers.forEach(m => map.removeLayer(m));
  state.markers = [];
}
 
// ══════════════════════════════════════════════════════════════════
//  PANEL
// ══════════════════════════════════════════════════════════════════
function openPanel()  { document.getElementById('panel').classList.add('open'); }
function closePanel() { document.getElementById('panel').classList.remove('open'); }
 
// スワイプダウンで閉じる
let _swipeY = 0;
const panel = document.getElementById('panel');
panel.addEventListener('touchstart', e => { _swipeY = e.touches[0].clientY; }, { passive:true });
panel.addEventListener('touchend',   e => {
  if (e.changedTouches[0].clientY - _swipeY > 60) closePanel();
}, { passive:true });
 
// ══════════════════════════════════════════════════════════════════
//  ROUTE
// ══════════════════════════════════════════════════════════════════
function openRoute(lat, lon) {
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`, '_blank');
}
 
// ══════════════════════════════════════════════════════════════════
//  LINE SHARE
// ══════════════════════════════════════════════════════════════════
function shareLine(lat, lon, name='現場ポイント') {
  const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
  const text    = `📍${name}\n現場位置共有\n${mapsUrl}`;
  const lineUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(mapsUrl)}&text=${encodeURIComponent(text)}`;
  window.open(lineUrl, '_blank');
}
function shareCurrent() {
  if (!state.gpsOk) { showToast('GPS未取得'); return; }
  shareLine(state.lat, state.lon, '現場現在地');
}
 
// ══════════════════════════════════════════════════════════════════
//  CACHE
// ══════════════════════════════════════════════════════════════════
function makeCacheKey(mode) {
  return `${mode}_${round2(state.lat)}_${round2(state.lon)}`;
}
function round2(v) { return Math.round(v * 100) / 100; }
 
function setCache(key, data) {
  try { localStorage.setItem('gm2_' + key, JSON.stringify({ ts:Date.now(), data })); } catch(_) {}
}
function getCache(key) {
  try {
    const raw = localStorage.getItem('gm2_' + key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > CACHE_TTL) return null;
    return obj.data;
  } catch(_) { return null; }
}
 
// ══════════════════════════════════════════════════════════════════
//  TOAST / RETRY BANNER
// ══════════════════════════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, dur=2300) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}
function showRetryBanner()  { document.getElementById('retry-banner').classList.add('show'); }
function hideRetryBanner()  { document.getElementById('retry-banner').classList.remove('show'); }
 
// ══════════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════════
function haversine(lat1, lon1, lat2, lon2) {
  const R  = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;
  const a  = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
 
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esca(s) { return String(s).replace(/'/g,"\\'").replace(/\n/g,' '); }
 
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
 
// ══════════════════════════════════════════════════════════════════
//  PWA — SERVICE WORKER (blob URL方式・1ファイルHTML対応)
// ══════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE_NAME='genba-map-v2';
const SHELL=['https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
             'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(SHELL)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(
    ks.filter(k=>k!==CACHE_NAME).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('overpass-api.de'))return;
  if(e.request.url.includes('fonts.googleapis'))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE_NAME).then(c=>c.put(e.request,clone));
    return res;
  })));
});`;
  try {
    const blob = new Blob([swCode], { type:'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  } catch(_) {}
}
 
// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  adjustLayout();
  window.addEventListener('resize', adjustLayout);
  startGPS();
});
</script>
