<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>現場写真 完全版</title>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f2}
header{position:fixed;top:0;width:100%;background:#000;color:#fff;padding:10px;text-align:center;z-index:10}
#cameraBtn{width:100%;padding:18px;font-size:18px;background:#2196F3;color:#fff;border:none}
.controls{padding-top:80px;padding:10px}
input,select{width:100%;margin:5px 0;padding:10px;font-size:15px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px}
.photo{position:relative}
.photo img{width:100%;border-radius:6px}
.label{position:absolute;bottom:0;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;width:100%;text-align:center}
.checkbox{position:absolute;top:5px;left:5px}
button{width:100%;margin:5px 0;padding:12px;font-size:15px}
</style>
</head>

<body>

<header>現場写真アプリ 完全版</header>

<button id="cameraBtn">📷 連続撮影</button>
<input type="file" id="camera" accept="image/*" capture="environment" multiple style="display:none">

<div class="controls">
<input id="project" placeholder="現場名（編集可）">
<input id="address" placeholder="住所（編集可）">
<input id="date" type="date">

<select id="floor"></select>
<select id="type"></select>

<button onclick="editList('floors')">階層編集</button>
<button onclick="editList('types')">定型文編集</button>
</div>

<div class="grid" id="grid"></div>

<div style="padding:10px">
<button onclick="printSelected()">🖨 印刷</button>
<button onclick="shareSelected()">📤 共有（LINE/メール）</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip"></script>

<script>

/* ===== IndexedDB ===== */
let db;
let req=indexedDB.open("genbaDB",1);
req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("photos",{keyPath:"id",autoIncrement:true});
};
req.onsuccess=e=>{
  db=e.target.result;
  loadPhotos();
};

/* ===== 設定 ===== */
let floors=JSON.parse(localStorage.getItem("floors"))||["1階","2階","屋上"];
let types=JSON.parse(localStorage.getItem("types"))||["施工前","施工後"];

function loadSelect(){
  floor.innerHTML=floors.map(f=>`<option>${f}</option>`).join("");
  type.innerHTML=types.map(t=>`<option>${t}</option>`).join("");
}
loadSelect();

/* ===== 編集 ===== */
function editList(key){
  let list=JSON.parse(localStorage.getItem(key))||[];
  let txt=prompt("改行で編集",list.join("\n"));
  if(txt){
    localStorage.setItem(key,JSON.stringify(txt.split("\n")));
    location.reload();
  }
}

/* ===== GPS ===== */
let currentPos=null;
navigator.geolocation.getCurrentPosition(p=>{
  currentPos=p.coords;
});

/* ===== 撮影 ===== */
cameraBtn.onclick=()=>camera.click();

camera.onchange=e=>{
  [...e.target.files].forEach(file=>{
    let reader=new FileReader();
    reader.onload=()=>{
      savePhoto({
        src:reader.result,
        floor:floor.value,
        type:type.value,
        project:project.value,
        address:address.value,
        date:date.value,
        lat:currentPos?.latitude||0,
        lng:currentPos?.longitude||0
      });
    };
    reader.readAsDataURL(file);
  });
};

/* ===== 保存 ===== */
function savePhoto(p){
  let tx=db.transaction("photos","readwrite");
  let store=tx.objectStore("photos");
  store.add(p);
  tx.oncomplete=loadPhotos;
}

/* ===== 読込 ===== */
let photos=[];
function loadPhotos(){
  let tx=db.transaction("photos","readonly");
  let store=tx.objectStore("photos");
  let req=store.getAll();
  req.onsuccess=()=>{
    photos=req.result;
    render();
  };
}

/* ===== 表示 ===== */
function render(){
  grid.innerHTML="";
  photos.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="photo";
    div.innerHTML=`
      <input type="checkbox" class="checkbox" data-i="${i}">
      <img src="${p.src}">
      <div class="label">${p.floor}/${p.type}</div>
    `;
    grid.appendChild(div);
  });
}

/* ===== 選択 ===== */
function getSelected(){
  return [...document.querySelectorAll(".checkbox:checked")]
    .map(c=>photos[c.dataset.i]);
}

/* ===== 印刷 ===== */
function printSelected(){
  let list=getSelected();
  let w=window.open("");
  list.forEach(p=>{
    w.document.write(`<img src="${p.src}" style="width:100%"><br>`);
  });
  w.print();
}

/* ===== ZIP共有 ===== */
async function shareSelected(){
  let list=getSelected();
  let zip=new JSZip();

  list.forEach((p,i)=>{
    let base64=p.src.split(',')[1];
    zip.file(`photo${i}.jpg`,base64,{base64:true});
  });

  let blob=await zip.generateAsync({type:"blob"});
  let file=new File([blob],"photos.zip");

  if(navigator.share){
    navigator.share({
      files:[file],
      title:"現場写真"
    });
  }else{
    alert("共有非対応端末");
  }
}

</script>

</body>
</html>
