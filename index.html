<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>
<script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>現場カメラ v9</title>
<style>
body{margin:0;font-family:system-ui;background:#000;color:#fff}
header{padding:12px;background:#111;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:18px}
main{padding:16px}
.btn{display:block;width:100%;padding:16px;margin:8px 0;background:#2563eb;border:0;border-radius:8px;color:#fff;font-size:16px;font-weight:600}
.btn:active{opacity:.7}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:16px}
.pic{aspect-ratio:1;background:#222;border-radius:4px;overflow:hidden}
.pic img{width:100%;height:100%;object-fit:cover}
#log{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #333;padding:8px;font-size:11px;font-family:monospace;max-height:100px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<header><h1>現場カメラ v9 - テスト</h1></header>
<main>
  <button class="btn" id="test">1. カメラ起動テスト</button>
  <button class="btn" id="test2" style="background:#059669">2. ファイル選択テスト</button>
  <button class="btn" id="test3" style="background:#dc2626">3. 権限確認</button>
  
  <input type="file" id="f1" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="f2" accept="image/*" style="display:none">
  
  <div class="grid" id="grid"></div>
</main>
<div id="log"></div>

<script>
const log = (m) => {
  const el = document.getElementById('log');
  el.textContent = new Date().toLocaleTimeString() + ' ' + m + '\n' + el.textContent;
  console.log(m);
};

log('起動完了');
log('UserAgent: ' + navigator.userAgent.slice(0,50));

document.getElementById('test').onclick = () => {
  log('カメラボタン押下');
  try {
    const i = document.getElementById('f1');
    log('input要素取得: ' + !!i);
    i.click();
    log('click()実行');
    setTimeout(() => log('3秒経過 - カメラ起動した？'), 3000);
  } catch(e) {
    log('ERROR: ' + e.message);
  }
};

document.getElementById('test2').onclick = () => {
  log('ファイル選択ボタン');
  document.getElementById('f2').click();
};

document.getElementById('test3').onclick = async () => {
  log('権限確認開始');
  log('mediaDevices: ' + !!navigator.mediaDevices);
  log('getUserMedia: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
  
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      log('カメラアクセス試行...');
      const stream = await navigator.mediaDevices.getUserMedia({video:true});
      log('成功！カメラ取得');
      stream.getTracks().forEach(t => t.stop());
    } catch(e) {
      log('失敗: ' + e.name + ' - ' + e.message);
    }
  }
};

document.getElementById('f1').onchange = (e) => {
  log('f1 onchange発火 ファイル数:' + e.target.files.length);
  handle(e.target.files);
};
document.getElementById('f2').onchange = (e) => {
  log('f2 onchange発火 ファイル数:' + e.target.files.length);
  handle(e.target.files);
};

function handle(files) {
  log('handle開始');
  for (const f of files) {
    log('ファイル: ' + f.name + ' ' + Math.round(f.size/1024) + 'KB');
    const url = URL.createObjectURL(f);
    const div = document.createElement('div');
    div.className = 'pic';
    div.innerHTML = '<img src="' + url + '">';
    document.getElementById('grid').prepend(div);
  }
}

// エラーを全てキャッチ
window.onerror = (m, s, l) => { log('ERROR: ' + m + ' at ' + l); return true; };
</script>
</body>
</html>
