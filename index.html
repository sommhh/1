<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>現場写真PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f0f0;}
header{
 position:fixed;top:0;width:100%;
 background:#000;color:#fff;
 padding:10px;z-index:100;
}
main{margin-top:110px;padding:10px;}
.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}
.card{
 background:#fff;
 padding:5px;
 border-radius:10px;
}
img{
 width:100%;
 height:90px;
 object-fit:cover;
 border-radius:6px;
}
button,select,input{
 width:100%;
 margin:4px 0;
 padding:8px;
 font-size:14px;
}
</style>
</head>

<body>

<header>
📸 現場写真PRO
<input type="file" id="cam" accept="image/*" capture="environment" multiple>
</header>

<main>

<input id="site" placeholder="現場名（例：〇〇邸）">

<select id="floor"></select>
<select id="type"></select>

<input id="addr" placeholder="住所">

<button onclick="printData()">印刷</button>
<button onclick="share()">LINE共有</button>

<div class="grid" id="list"></div>

</main>

<script>

// ===== DB安全 =====
let db=[];
try{db=JSON.parse(localStorage.getItem("db"))||[]}catch{db=[]}

// ===== 定型 =====
let floors=JSON.parse(localStorage.getItem("floors")||'["1階","2階","屋上"]');
let types=JSON.parse(localStorage.getItem("types")||'["施工前","施工中","施工後"]');

const floorSel=document.getElementById("floor");
const typeSel=document.getElementById("type");

function loadSel(){
 floorSel.innerHTML="";
 typeSel.innerHTML="";
 floors.forEach(v=>{
  let o=document.createElement("option");
  o.textContent=v;
  floorSel.appendChild(o);
 });
 types.forEach(v=>{
  let o=document.createElement("option");
  o.textContent=v;
  typeSel.appendChild(o);
 });
}
loadSel();

// ===== 保存 =====
function save(){
 try{
  localStorage.setItem("db",JSON.stringify(db));
 }catch{
  alert("容量オーバー（古い写真削除）");
 }
}

// ===== 圧縮 =====
function compress(src,cb){
 const img=new Image();
 img.onload=()=>{
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");

  let scale=0.4;
  c.width=img.width*scale;
  c.height=img.height*scale;

  ctx.drawImage(img,0,0,c.width,c.height);
  cb(c.toDataURL("image/jpeg",0.6));
 };
 img.src=src;
}

// ===== 撮影 =====
document.getElementById("cam").addEventListener("change",e=>{
 const files=[...e.target.files];
 files.forEach(file=>{
  const fr=new FileReader();
  fr.onload=()=>{
   compress(fr.result,(small)=>{
    db.push({
     img:small,
     site:document.getElementById("site").value,
     floor:floorSel.value,
     type:typeSel.value,
     date:new Date().toLocaleString(),
     addr:document.getElementById("addr").value
    });
    save();
    render();
   });
  };
  fr.readAsDataURL(file);
 });
});

// ===== 表示 =====
function render(){
 const list=document.getElementById("list");
 list.innerHTML="";

 db.forEach((p,i)=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <img src="${p.img}">
   <small>${p.site}</small><br>
   <small>${p.floor} ${p.type}</small><br>
   <small>${p.date}</small><br>
   <small contenteditable onblur="edit(${i},this.innerText)">${p.addr||""}</small>
   <button onclick="del(${i})">削除</button>
  `;

  list.appendChild(div);
 });
}

// ===== 編集 =====
function edit(i,val){
 db[i].addr=val;
 save();
}

// ===== 削除 =====
function del(i){
 db.splice(i,1);
 save();
 render();
}

// ===== 印刷 =====
function printData(){
 let w=window.open("");
 let html="";
 db.forEach(p=>{
  html+=`
  <div>
   <img src="${p.img}" style="width:100%">
   <p>${p.site} ${p.floor} ${p.type}</p>
   <p>${p.date}</p>
   <p>${p.addr}</p>
  </div>`;
 });
 w.document.write(html);
 w.print();
}

// ===== 共有 =====
function share(){
 if(navigator.share){
  navigator.share({title:"現場写真"});
 }else{
  alert("共有非対応");
 }
}

// ===== GPS =====
navigator.geolocation.getCurrentPosition(pos=>{
 document.getElementById("addr").value=
 pos.coords.latitude+","+pos.coords.longitude;
},{enableHighAccuracy:true});

render();

</script>
</body>
</html>
