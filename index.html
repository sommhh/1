<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>写真ログ完成版</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}

header{
  background:#007aff;
  color:#fff;
  padding:12px;
  font-size:18px;
  text-align:center;
}

.container{padding:10px}

.cam{
  background:#007aff;
  color:#fff;
  padding:30px;
  font-size:22px;
  text-align:center;
  border-radius:12px;
  position:relative;
  margin-bottom:10px;
}

.cam input{
  position:absolute;
  inset:0;
  opacity:0;
}

select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-bottom:8px;
}

.card{
  background:#fff;
  padding:8px;
  border-radius:10px;
  margin-bottom:10px;
}

.card img{
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<header>📷 写真ログ</header>

<div class="container">

<div class="cam">
📷 撮る（連続OK）
<input type="file" accept="image/*" capture="environment" id="cam">
</div>

<select id="floor">
<option>1階</option>
<option>2階</option>
<option>屋上</option>
</select>

<select id="tpl">
<option>施工前</option>
<option>施工後</option>
<option>確認</option>
<option>異常なし</option>
<option>要修正</option>
<option>完了</option>
</select>

<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="printSelected()">🖨 選択印刷</button>

<div id="list"></div>

</div>

<script>

const KEY="photo_app_final";
let selected=new Set();

function load(){
  return JSON.parse(localStorage.getItem(KEY)||"[]");
}

function save(data){
  localStorage.setItem(KEY,JSON.stringify(data));
}

function fmtDate(){
  return new Date().toLocaleString();
}

function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const w=1200;
        const s=w/img.width;
        c.width=w;
        c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.7));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function getPos(){
  return new Promise((res,rej)=>{
    navigator.geolocation.getCurrentPosition(res,rej);
  });
}

async function geocode(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const d=await r.json();
    return d.display_name;
  }catch{
    return "";
  }
}

/* ===== 保存（最重要） ===== */
async function quickSave(file){

  const floor=document.getElementById("floor").value;
  const tpl=document.getElementById("tpl").value;
  const memo=document.getElementById("memo").value;

  const img=await compress(file);
  const date=fmtDate();

  let data=load();
  const id=Date.now();

  // 🔥先保存（爆速）
  data.push({
    id,
    img,
    floor,
    memo:tpl+" "+memo,
    addr:"取得中...",
    date
  });

  save(data);
  render();

  // 🔥後でGPS
  try{
    const pos=await getPos();
    const addr=await geocode(pos.coords.latitude,pos.coords.longitude);

    let data2=load();
    let p=data2.find(x=>x.id===id);
    if(p) p.addr=addr;

    save(data2);
    render();
  }catch{}
}

/* ===== 連続撮影 ===== */
cam.addEventListener("change",async(e)=>{
  const f=e.target.files[0];
  if(!f) return;

  await quickSave(f);

  // 🔥これが重要
  e.target.value="";
});

/* ===== 表示 ===== */
function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const data=load().reverse();

  data.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.id=p.id;

    div.innerHTML=`
    <img src="${p.img}">
    <div>${p.floor}</div>
    <div>${p.memo}</div>
    <div>${p.addr}</div>
    <div>${p.date}</div>

    <button onclick="toggleSelect(${p.id})">✔ 選択</button>
    <button onclick="edit(${p.id})">✏️ 編集</button>
    <button onclick="del(${p.id})">🗑 削除</button>
    <button onclick="share(${p.id})">📤 共有</button>
    `;

    if(selected.has(p.id)){
      div.style.border="3px solid red";
    }

    list.appendChild(div);
  });
}

/* ===== 選択 ===== */
function toggleSelect(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  render();
}

/* ===== 印刷 ===== */
function printSelected(){
  if(selected.size===0){
    alert("選択して");
    return;
  }

  document.querySelectorAll(".card").forEach(el=>{
    const id=parseInt(el.dataset.id);
    el.style.display=selected.has(id)?"block":"none";
  });

  window.print();

  setTimeout(render,500);
}

/* ===== 削除 ===== */
function del(id){
  let data=load().filter(x=>x.id!==id);
  save(data);
  render();
}

/* ===== 編集 ===== */
function edit(id){
  let data=load();
  let p=data.find(x=>x.id===id);

  let addr=prompt("住所",p.addr);
  let date=prompt("日時",p.date);

  if(addr!==null) p.addr=addr;
  if(date!==null) p.date=date;

  save(data);
  render();
}

/* ===== 共有 ===== */
async function share(id){
  const p=load().find(x=>x.id===id);
  if(!p) return;

  const blob=dataURLtoBlob(p.img);
  const file=new File([blob],"photo.jpg",{type:"image/jpeg"});

  if(navigator.share){
    await navigator.share({
      files:[file],
      text:p.memo
    });
  }else{
    alert("共有できない端末");
  }
}

function dataURLtoBlob(dataurl){
  const arr=dataurl.split(",");
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  let n=bstr.length;
  const u8=new Uint8Array(n);
  while(n--){
    u8[n]=bstr.charCodeAt(n);
  }
  return new Blob([u8],{type:mime});
}

render();

</script>

</body>
</html>
