<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>写真ログ 完全版</title>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f7}
header{background:#007aff;color:#fff;padding:14px;font-size:18px}

.wrap{padding:10px}
.big{width:100%;padding:18px;font-size:18px;border:none;border-radius:12px;background:#007aff;color:#fff;margin-bottom:8px}
textarea{width:100%;padding:10px;border-radius:10px;margin-bottom:8px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:#fff;border-radius:10px;overflow:hidden;position:relative}
.card img{width:100%;aspect-ratio:1;object-fit:cover}
.meta{font-size:10px;padding:4px}
.sel{outline:3px solid red}

.tpl button{margin:2px;font-size:11px}

</style>
</head>

<body>

<header>📷 写真ログ 完全版</header>

<div class="wrap">

<label class="big">
📷 撮る
<input type="file" id="file" accept="image/*" capture="environment" hidden>
</label>

<textarea id="memo" placeholder="メモ"></textarea>

<div class="tpl" id="tpl"></div>

<button class="big" onclick="save()">保存</button>
<button class="big" onclick="toggleSelect()">選択</button>
<button class="big" onclick="share()">共有</button>
<button class="big" onclick="window.print()">印刷</button>
<button class="big" onclick="editTpl()">定型文編集</button>

</div>

<div class="wrap" id="folders"></div>

<script>

let photos=JSON.parse(localStorage.getItem("p")||"[]")
let tpl=JSON.parse(localStorage.getItem("tpl")||JSON.stringify([
"施工前","施工後","完了","問題なし","要確認",
"OK","NG","注意","写真のみ","報告"
]))

let lastGPS=null
let selectMode=false
let selected=new Set()

// ===== GPS =====
function getGPS(){
return new Promise(res=>{
if(lastGPS)return res(lastGPS)
navigator.geolocation.getCurrentPosition(p=>{
lastGPS=p
res(p)
},()=>res(null))
})
}

// ===== 距離 =====
function dist(a,b,c,d){
const R=6371000
const x=(c-a)*Math.PI/180
const y=(d-b)*Math.PI/180
return Math.sqrt(x*x+y*y)*R
}

// ===== 圧縮 =====
function compress(file){
return new Promise(r=>{
const rd=new FileReader()
rd.onload=e=>{
const img=new Image()
img.onload=()=>{
const c=document.createElement("canvas")
const w=900
const h=img.height*(w/img.width)
c.width=w;c.height=h
c.getContext("2d").drawImage(img,0,0,w,h)
r(c.toDataURL("image/jpeg",0.7))
}
img.src=e.target.result
}
rd.readAsDataURL(file)
})
}

// ===== 保存 =====
async function save(){
const f=file.files[0]
if(!f)return alert("写真選択")

const img=await compress(f)
const memo=document.getElementById("memo").value
const date=new Date().toISOString().slice(0,10)

let lat=null,lng=null
const g=await getGPS()
if(g){lat=g.coords.latitude;lng=g.coords.longitude}

// フォルダ判定
let folder="未分類_"+date
for(let p of photos){
if(p.date!==date)continue
if(p.lat && dist(lat,lng,p.lat,p.lng)<15){
folder=p.folder
break
}
}

photos.push({
id:Date.now(),
img,memo,lat,lng,date,
folder
})

localStorage.setItem("p",JSON.stringify(photos))
memo.value=""
file.value=""
render()
}

// ===== 定型文 =====
function renderTpl(){
tpl.innerHTML=""
tpl.forEach(t=>{
const b=document.createElement("button")
b.textContent=t
b.onclick=()=>memo.value+=t+"\n"
tpl.appendChild(b)
})
}

function editTpl(){
const t=prompt("10個（カンマ区切り）",tpl.join(","))
if(!t)return
tpl=t.split(",").slice(0,10)
localStorage.setItem("tpl",JSON.stringify(tpl))
renderTpl()
}

// ===== 削除 =====
function del(id){
if(!confirm("削除？"))return
photos=photos.filter(p=>p.id!==id)
localStorage.setItem("p",JSON.stringify(photos))
render()
}

// ===== 編集 =====
function edit(id){
const p=photos.find(x=>x.id===id)
const m=prompt("メモ",p.memo)
const d=prompt("日付",p.date)
const f=prompt("フォルダ名",p.folder)
if(m!==null)p.memo=m
if(d!==null)p.date=d
if(f!==null)p.folder=f
localStorage.setItem("p",JSON.stringify(photos))
render()
}

// ===== 選択 =====
function toggleSelect(){
selectMode=!selectMode
selected.clear()
render()
}

// ===== 共有 =====
async function share(){
let list=photos.filter(p=>selected.has(p.id))
if(list.length===0)list=[photos[photos.length-1]]

const p=list[0]
const blob=await (await fetch(p.img)).blob()
const file=new File([blob],"photo.jpg",{type:"image/jpeg"})

if(navigator.share){
navigator.share({files:[file],text:p.memo})
}else{
alert("共有不可")
}
}

// ===== 表示 =====
function render(){
folders.innerHTML=""

let map={}
photos.forEach(p=>{
if(!map[p.folder])map[p.folder]=[]
map[p.folder].push(p)
})

Object.keys(map).forEach(f=>{
const box=document.createElement("div")
box.innerHTML=`<h3>${f}</h3>`

const g=document.createElement("div")
g.className="grid"

map[f].forEach(p=>{
const c=document.createElement("div")
c.className="card"
if(selected.has(p.id))c.classList.add("sel")

c.onclick=()=>{
if(selectMode){
selected.has(p.id)?selected.delete(p.id):selected.add(p.id)
render()
}
}

c.innerHTML=`
<img src="${p.img}">
<div class="meta">${p.date}<br>${p.memo}</div>
<button onclick="event.stopPropagation();edit(${p.id})">編集</button>
<button onclick="event.stopPropagation();del(${p.id})">削除</button>
`

g.appendChild(c)
})

box.appendChild(g)
folders.appendChild(box)
})
}

renderTpl()
render()

</script>

</body>
</html>
