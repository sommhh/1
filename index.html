<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>写真ログ最強版</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#007aff;
  color:#fff;
  padding:12px;
  font-size:18px;
}

.container{
  padding:10px;
}

.cam-btn{
  width:100%;
  background:#007aff;
  color:#fff;
  padding:25px;
  font-size:20px;
  border-radius:12px;
  text-align:center;
  margin-bottom:10px;
  position:relative;
}

.cam-btn input{
  position:absolute;
  inset:0;
  opacity:0;
}

select,textarea{
  width:100%;
  margin-bottom:8px;
  padding:10px;
  font-size:14px;
}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:8px;
}

.btn{
  margin-top:5px;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<header>📷 写真ログ</header>

<div class="container">

<div class="cam-btn">
📷 撮る
<input type="file" accept="image/*" capture="environment" id="cam">
</div>

<select id="floor">
<option>1階</option>
<option>2階</option>
<option>屋上</option>
</select>

<select id="tpl">
<option>施工前</option>
<option>施工後</option>
<option>確認</option>
<option>異常なし</option>
<option>要修正</option>
<option>完了</option>
</select>

<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="printSelected()">🖨 印刷</button>

<div id="list"></div>

</div>

<script>

const KEY="photos_v1";

function load(){
  return JSON.parse(localStorage.getItem(KEY)||"[]");
}

function save(data){
  localStorage.setItem(KEY,JSON.stringify(data));
}

function fmtDate(){
  const d=new Date();
  return d.toLocaleString();
}

async function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const w=1200;
        const scale=w/img.width;
        c.width=w;
        c.height=img.height*scale;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.7));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function getPos(){
  return new Promise((res,rej)=>{
    navigator.geolocation.getCurrentPosition(res,rej);
  });
}

async function geocode(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const d=await r.json();
    return d.display_name;
  }catch{
    return "";
  }
}

document.getElementById("cam").addEventListener("change",async(e)=>{
  const f=e.target.files[0];
  if(!f) return;

  const floor=document.getElementById("floor").value;
  const tpl=document.getElementById("tpl").value;
  const memo=document.getElementById("memo").value;

  let lat=null,lng=null,addr="";

  try{
    const pos=await getPos();
    lat=pos.coords.latitude;
    lng=pos.coords.longitude;
    addr=await geocode(lat,lng);
  }catch{}

  const img=await compress(f);

  const data=load();

  data.push({
    id:Date.now(),
    img,
    floor,
    memo:tpl+" "+memo,
    addr,
    date:fmtDate()
  });

  save(data);
  render();

  // 連続撮影
  e.target.value="";
});

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const data=load().reverse();

  data.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <img src="${p.img}">
    <div>${p.floor}</div>
    <div>${p.memo}</div>
    <div>${p.addr||""}</div>
    <div>${p.date}</div>
    <button class="btn" onclick="edit(${p.id})">編集</button>
    <button class="btn" onclick="del(${p.id})">削除</button>
    <button class="btn" onclick="share(${p.id})">共有</button>
    `;

    list.appendChild(div);
  });
}

function del(id){
  const data=load().filter(x=>x.id!==id);
  save(data);
  render();
}

function edit(id){
  const data=load();
  const p=data.find(x=>x.id===id);
  if(!p) return;

  const addr=prompt("住所",p.addr);
  const date=prompt("日時",p.date);

  if(addr!==null) p.addr=addr;
  if(date!==null) p.date=date;

  save(data);
  render();
}

async function share(id){
  const p=load().find(x=>x.id===id);
  if(!p) return;

  const blob=dataURLtoBlob(p.img);
  const file=new File([blob],"photo.jpg",{type:"image/jpeg"});

  if(navigator.share){
    await navigator.share({
      files:[file],
      text:p.memo
    });
  }else{
    alert("共有非対応");
  }
}

function dataURLtoBlob(dataurl){
  const arr=dataurl.split(",");
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  let n=bstr.length;
  const u8arr=new Uint8Array(n);
  while(n--){
    u8arr[n]=bstr.charCodeAt(n);
  }
  return new Blob([u8arr],{type:mime});
}

function printSelected(){
  window.print();
}

render();

</script>

</body>
</html>
