<script>
const $ = s => document.querySelector(s);
const video = $('#video'), previewImg = $('#previewImg'), noCamera = $('#noCamera');
let stream = null, currentFacing = 'environment', db = null, currentBlob = null, tempMeta = null;
const DB_NAME='genba-v5', STORE='photos';
const posBtns = document.querySelectorAll('.pos-grid button');

function getBBSettings(){
  try{
    const v = JSON.parse(localStorage.getItem('bbSettings')||'{}');
    return {company:v.company||'', person:v.person||'', size:v.size||'medium', opacity:v.opacity||'100', position:v.position||'bottom-right'};
  }catch{ return {company:'',person:'',size:'medium',opacity:'100',position:'bottom-right'} }
}
function saveBB(s){ localStorage.setItem('bbSettings', JSON.stringify(s)); }

function toast(msg){
  const t=document.createElement('div');
  t.className='fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2.5 rounded-2xl shadow-xl z-[200] text-sm font-medium';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300)},2000);
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBlackboard(ctx,x,y,w,h,data,settings){
  ctx.save();
  const opacity = parseInt(settings.opacity||'100')/100;
  ctx.globalAlpha = opacity;
  ctx.fillStyle='#0c2516';
  const r=Math.max(10, w*0.02); roundRect(ctx,x,y,w,h,r); ctx.fill();
  ctx.globalAlpha=Math.min(1,opacity+0.1);
  ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(3,w*0.012); roundRect(ctx,x,y,w,h,r); ctx.stroke();
  ctx.lineWidth=Math.max(1.5,w*0.004); ctx.beginPath();
  const rowH=h/4;
  for(let i=1;i<4;i++){ctx.moveTo(x,y+i*rowH);ctx.lineTo(x+w,y+i*rowH);}
  const colX=x+w*0.26; ctx.moveTo(colX,y);ctx.lineTo(colX,y+h);
  ctx.moveTo(x+w*0.5,y+rowH*3);ctx.lineTo(x+w*0.5,y+h); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=w*0.01;
  const pad=w*0.022, fs=w*0.058;
  const labels=['工事名','工種','備考'], values=[data.project||'',data.work||'',data.note||''];
  for(let i=0;i<3;i++){const cy=y+rowH*(i+0.5); ctx.font=`600 ${fs*0.88}px "Noto Sans JP",system-ui`; ctx.fillText(labels[i],x+pad,cy); ctx.font=`500 ${fs}px "Noto Sans JP",system-ui`; ctx.fillText(values[i],colX+pad,cy,w-colX-pad*2);}
  const by=y+rowH*3+rowH/2; ctx.font=`${fs*0.84}px "Noto Sans JP"`; ctx.fillText(data.date||'',x+pad,by);
  ctx.fillText(data.company||'',x+w*0.5+pad,by-rowH*0.22,w*0.48); ctx.font=`${fs*0.76}px "Noto Sans JP"`; ctx.globalAlpha=opacity*0.9; ctx.fillText(data.person||'',x+w*0.5+pad,by+rowH*0.22,w*0.48);
  ctx.restore();
}
function blobToImage(blob){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=URL.createObjectURL(blob);});}

async function compositeBlackboard(imgBlob, data){
  const img = await blobToImage(imgBlob);
  const canvas=document.createElement('canvas'); canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
  const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0);
  const settings=getBBSettings();
  const scale={small:0.35,medium:0.45,large:0.55}[settings.size]||0.45;
  const boardW=canvas.width*scale, boardH=boardW*0.65, margin=canvas.width*0.02;
  const positions = {
    'top-left': {x: margin, y: margin},
    'top': {x: (canvas.width - boardW)/2, y: margin},
    'top-right': {x: canvas.width - boardW - margin, y: margin},
    'left': {x: margin, y: (canvas.height - boardH)/2},
    'center': {x: (canvas.width - boardW)/2, y: (canvas.height - boardH)/2},
    'right': {x: canvas.width - boardW - margin, y: (canvas.height - boardH)/2},
    'bottom-left': {x: margin, y: canvas.height - boardH - margin},
    'bottom': {x: (canvas.width - boardW)/2, y: canvas.height - boardH - margin},
    'bottom-right': {x: canvas.width - boardW - margin, y: canvas.height - boardH - margin}
  };
  const pos = positions[settings.position || 'bottom-right'];
  const x=pos.x; const y=pos.y;
  drawBlackboard(ctx,x,y,boardW,boardH,data,settings);
  return new Promise(r=>canvas.toBlob(r,'image/jpeg',0.88));
}

function initDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE)){d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true})}};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=rej;});}
function addPhoto(blob,thumb,meta){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const q=tx.objectStore(STORE).add({blob,thumb,...meta});q.onsuccess=()=>res(q.result);q.onerror=rej;});}
function getAllPhotos(){return new Promise(res=>{const tx=db.transaction(STORE,'readonly');const q=tx.objectStore(STORE).getAll();q.onsuccess=()=>res(q.result||[]);});}
function deletePhoto(id){return new Promise(res=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id).onsuccess=()=>res();});}
function clearAll(){return new Promise(res=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear().onsuccess=()=>res();});}

async function startCamera(){stopCamera();try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:currentFacing},width:{ideal:1920},height:{ideal:1440}},audio:false});video.srcObject=stream;await video.play();noCamera.classList.add('hidden');noCamera.classList.remove('grid');}catch(e){noCamera.classList.remove('hidden');noCamera.classList.add('grid');}}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}

function showLive(){previewImg.classList.add('hidden');video.classList.remove('hidden');$('#btnCapture').classList.remove('hidden');$('#afterCapture').classList.add('hidden');if(previewImg.src)URL.revokeObjectURL(previewImg.src);currentBlob=null;}
function showPreview(blob){previewImg.src=URL.createObjectURL(blob);previewImg.classList.remove('hidden');video.classList.add('hidden');$('#btnCapture').classList.add('hidden');$('#afterCapture').classList.remove('hidden');}

async function handleCapture(){
  if(!video.videoWidth){toast('カメラ準備中');return;}
  const c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;c.getContext('2d').drawImage(video,0,0);
  const raw=await new Promise(r=>c.toBlob(r,'image/jpeg',0.92));
  const s=getBBSettings(); const data={project:$('#inpProject').value.trim(),work:$('#inpWork').value.trim(),note:$('#inpNote').value.trim(),date:new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}),company:s.company,person:s.person};
  const finalBlob=await compositeBlackboard(raw,data); currentBlob=finalBlob; tempMeta={...data,createdAt:Date.now()}; showPreview(finalBlob);
}
async function saveCurrent(){
  if(!currentBlob)return;
  const img=await blobToImage(currentBlob); const tw=900, th=Math.round(img.height*tw/img.width);
  const c=document.createElement('canvas');c.width=tw;c.height=th;c.getContext('2d').drawImage(img,0,0,tw,th);
  const thumb=await new Promise(r=>c.toBlob(r,'image/jpeg',0.78));
  await addPhoto(currentBlob,thumb,tempMeta); toast('保存しました'); showLive();
}

function saveForm(){localStorage.setItem('genbaForm',JSON.stringify({project:$('#inpProject').value,work:$('#inpWork').value,note:$('#inpNote').value}));}
function loadForm(){try{const f=JSON.parse(localStorage.getItem('genbaForm')||'{}');$('#inpProject').value=f.project||'';$('#inpWork').value=f.work||'';$('#inpNote').value=f.note||'';}catch{}}

function updateSettingsSummary(){const s=getBBSettings();const p={ 'top-left':'左上',top:'上','top-right':'右上',left:'左',center:'中央',right:'右','bottom-left':'左下',bottom:'下','bottom-right':'右下'};const z={small:'小',medium:'中',large:'大'};$('#settingsSummary').textContent=`${p[s.position]}・${z[s.size]}・${s.opacity}%`;}

function updatePreview(){
  const cv=$('#previewCanvas'),ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  const grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,'#334155');grad.addColorStop(1,'#0f172a');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#1e293b';ctx.fillRect(0,h*0.55,w,h*0.45);
  ctx.fillStyle='#475569';for(let i=0;i<5;i++)ctx.fillRect(w*0.12+i*w*0.16,h*0.32,w*0.1,h*0.22);
  const size=document.querySelector('input[name="size"]:checked').value; const opacity=document.querySelector('input[name="opacity"]:checked').value;
  const company=$('#setCompany').value, person=$('#setPerson').value;
  const pos=document.querySelector('.pos-grid button.active')?.dataset.pos||'bottom-right';
  const settings={size,opacity,position:pos};
  const data={project:'〇〇ビル新築工事',work:'配筋検査',note:'3FL スラブ',date:new Date().toLocaleDateString('ja-JP'),company:company||'山田建設',person:person||'田中'};
  const scale={small:0.35,medium:0.45,large:0.55}[size]; const bw=w*scale, bh=bw*0.65, m=w*0.02;
  const positions={'top-left':{x:m,y:m},top:{x:(w-bw)/2,y:m},'top-right':{x:w-bw-m,y:m},left:{x:m,y:(h-bh)/2},center:{x:(w-bw)/2,y:(h-bh)/2},right:{x:w-bw-m,y:(h-bh)/2},'bottom-left':{x:m,y:h-bh-m},bottom:{x:(w-bw)/2,y:h-bh-m},'bottom-right':{x:w-bw-m,y:h-bh-m}};
  const p=positions[pos]; drawBlackboard(ctx,p.x,p.y,bw,bh,data,settings);
}

function openSettings(){
  const s=getBBSettings(); $('#setCompany').value=s.company; $('#setPerson').value=s.person;
  document.querySelector(`input[name="size"][value="${s.size}"]`).checked=true;
  document.querySelector(`input[name="opacity"][value="${s.opacity}"]`).checked=true;
  posBtns.forEach(b=>{const on=b.dataset.pos===s.position; b.classList.toggle('active',on); b.classList.toggle('bg-blue-600',on); b.classList.toggle('text-white',on); b.classList.toggle('border-blue-600',on);});
  $('#settingsModal').classList.remove('hidden'); updatePreview();
}
function closeSettings(){$('#settingsModal').classList.add('hidden');}

async function renderGallery(){
  const photos=await getAllPhotos(); const grid=$('#galleryGrid'); grid.innerHTML=''; $('#photoCount').textContent=`${photos.length}枚`;
  $('#emptyGallery').classList.toggle('hidden',photos.length>0);
  photos.sort((a,b)=>b.createdAt-a.createdAt);
  for(const p of photos){
    const url=URL.createObjectURL(p.thumb||p.blob);
    const d=new Date(p.createdAt);
    const el=document.createElement('div'); el.className='group relative bg-white rounded-2xl overflow-hidden border border-slate-200 shadow-sm';
    el.innerHTML=`<img src="${url}" class="w-full aspect-[4/3] object-cover"><div class="p-3"><div class="text-[13px] font-semibold truncate">${p.project||'無題'}</div><div class="text-[11px] text-slate-500 mt-0.5">${d.toLocaleDateString('ja-JP')} ${p.work||''}</div></div><div class="absolute top-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition"><button data-dl="${p.id}" class="w-8 h-8 grid place-items-center rounded-lg bg-black/70 text-white hover:bg-black">↓</button><button data-del="${p.id}" class="w-8 h-8 grid place-items-center rounded-lg bg-red-600/90 text-white hover:bg-red-600">×</button></div>`;
    grid.appendChild(el);
  }
  grid.querySelectorAll('[data-dl]').forEach(b=>b.onclick=async()=>{const id=+b.dataset.dl;const ph=(await getAllPhotos()).find(x=>x.id===id);const a=document.createElement('a');a.href=URL.createObjectURL(ph.blob);a.download=`genba_${id}.jpg`;a.click();});
  grid.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{if(confirm('削除しますか？')){await deletePhoto(+b.dataset.del);renderGallery();}});
}
async function downloadAll(){
  const photos=await getAllPhotos(); if(!photos.length){toast('写真がありません');return;}
  const zip=new JSZip(); const folder=zip.folder('現場写真');
  photos.sort((a,b)=>a.createdAt-b.createdAt);
  for(let i=0;i<photos.length;i++){const p=photos[i]; const d=new Date(p.createdAt); const name=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}_${(p.project||'').replace(/[\\/:*?"<>|]/g,'')||'photo'}.jpg`; folder.file(name,p.blob);}
  toast('ZIPを作成中...'); const blob=await zip.generateAsync({type:'blob'}); const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`現場写真_${new Date().toISOString().slice(0,10)}.zip`;a.click();
}

document.addEventListener('DOMContentLoaded', async ()=>{
  await initDB(); await startCamera(); loadForm(); updateSettingsSummary();
  ['inpProject','inpWork','inpNote'].forEach(id=>$('#'+id).addEventListener('input',saveForm));
  $('#btnCapture').onclick=handleCapture; $('#btnRetake').onclick=showLive; $('#btnSave').onclick=saveCurrent;
  $('#btnSwitch').onclick=async()=>{currentFacing=currentFacing==='environment'?'user':'environment'; await startCamera();};
  $('#fileInput').onchange=async e=>{const f=e.target.files[0]; if(!f)return; const s=getBBSettings(); const data={project:$('#inpProject').value.trim(),work:$('#inpWork').value.trim(),note:$('#inpNote').value.trim(),date:new Date().toLocaleDateString('ja-JP'),company:s.company,person:s.person}; const out=await compositeBlackboard(f,data); currentBlob=out; tempMeta={...data,createdAt:Date.now()}; showPreview(out); e.target.value='';};
  $('#btnSettings').onclick=openSettings; $('#btnCloseSettings').onclick=closeSettings; $('#settingsBackdrop').onclick=closeSettings; $('#btnCancelSettings').onclick=closeSettings;
  $('#btnSaveSettings').onclick=()=>{const s={company:$('#setCompany').value.trim(),person:$('#setPerson').value.trim(),size:document.querySelector('input[name="size"]:checked').value,opacity:document.querySelector('input[name="opacity"]:checked').value,position:document.querySelector('.pos-grid button.active').dataset.pos}; saveBB(s); updateSettingsSummary(); closeSettings(); toast('黒板設定を保存');};
  posBtns.forEach(b=>b.onclick=()=>{posBtns.forEach(x=>{x.classList.remove('active','bg-blue-600','text-white','border-blue-600');}); b.classList.add('active','bg-blue-600','text-white','border-blue-600'); updatePreview();});
  ['setCompany','setPerson'].forEach(id=>$('#'+id).addEventListener('input',updatePreview));
  document.querySelectorAll('input[name="size"],input[name="opacity"]').forEach(r=>r.addEventListener('change',updatePreview));
  $('#btnGallery').onclick=async()=>{stopCamera();$('#cameraView').classList.add('hidden');$('#galleryView').classList.remove('hidden');await renderGallery();};
  $('#btnBackCamera').onclick=()=>{$('#galleryView').classList.add('hidden');$('#cameraView').classList.remove('hidden');startCamera();};
  $('#btnDownloadAll').onclick=downloadAll;
  $('#btnClearAll').onclick=async()=>{if(confirm('全ての写真を削除しますか？')){await clearAll();await renderGallery();toast('削除しました');}};
});
</script>
</body>
