<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0}
header{position:sticky;top:0;background:#0f172a;border-bottom:1px solid #334155;z-index:30}
.hd{display:flex;align-items:center;gap:8px;padding:10px 12px}
.hd img{height:24px}
.sp{flex:1}
.btn-img{height:32px;cursor:pointer;border-radius:6px}
.btn-img:active{opacity:.7}
main{padding:10px;padding-bottom:90px}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px}
.row{display:flex;gap:6px;margin-top:6px}
select{flex:1;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:7px;color:#fff;font-size:14px}
.big-img{width:100%;height:48px;object-fit:contain;cursor:pointer;border-radius:9px;margin-bottom:6px}
.big-img:active{opacity:.8}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.pic{aspect-ratio:1;background:#000;border-radius:6px;overflow:hidden;position:relative}
.pic img{width:100%;height:100%;object-fit:cover}
.pic.sel{outline:2px solid #2563eb}
.tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:8px}
.tab{padding:5px 12px;background:#111;border:1px solid #333;border-radius:15px;font-size:12px;white-space:nowrap;cursor:pointer}
.tab.on{background:#2563eb;border-color:#3b82f6}
#vidW{display:none;position:fixed;inset:0;background:#000;z-index:99}
#vid,#preview{width:100%;height:100%;object-fit:contain}
#previewC{display:none;position:absolute;inset:0}
#snap{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;background:#fff;border:4px solid #0003;font-size:26px}
#close{position:absolute;top:15px;right:15px;width:36px;height:36px;border-radius:50%;background:#000a;color:#fff;border:none;font-size:22px}
#saveBtn,#retryBtn{position:absolute;bottom:30px;padding:11px 18px;border:none;border-radius:8px;color:#fff;font-weight:700;display:none}
#retryBtn{left:20px;background:#334155}
#saveBtn{right:20px;background:#059669}
footer{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #334155;padding:8px}
.acts{display:flex;gap:8px;justify-content:space-around}
.acts img{height:38px;cursor:pointer}
.acts img:active{opacity:.7}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#1e293b;padding:8px 14px;border-radius:7px;font-size:12px;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.hidden{display:none}
.empty{padding:30px;text-align:center;opacity:.5}
</style>

<script>
!function(){
var $=function(s){return document.querySelector(s)};
function t(m){var e=$('#toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},1400)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
var db,site=null,photos=[],sel=new Set(),selMode=false,floor='1Г©ВҡВҺ',stream=null,shot=null;

function openDB(){return new Promise(function(r){var q=indexedDB.open('g1',1);q.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains('s'))d.createObjectStore('s',{keyPath:'id'});if(!d.objectStoreNames.contains('p')){var p=d.createObjectStore('p',{keyPath:'id'});p.createIndex('site','sid')}};q.onsuccess=function(){r(q.result)}})}
function tx(n,m){return db.transaction(n,m||'readonly').objectStore(n)}
function all(n){return new Promise(function(r){tx(n).getAll().onsuccess=function(e){r(e.target.result||[])}})}
function bySite(id){return new Promise(function(r){tx('p').index('site').getAll(id).onsuccess=function(e){r(e.target.result||[])}})}
function put(n,o){return new Promise(function(r){tx(n,'readwrite').put(o).onsuccess=function(){r(1)}})}
function del(n,i){return new Promise(function(r){tx(n,'readwrite').delete(i).onsuccess=r})}
function blob(c){return new Promise(function(r){c.toBlob(r,'image/jpeg',0.85)})}
function thumb(c){var t=document.createElement('canvas'),s=300;t.width=s;t.height=s;var x=t.getContext('2d'),w=c.width,h=c.height,k=Math.min(s/w,s/h);x.fillStyle='#000';x.fillRect(0,0,s,s);x.drawImage(c,(s-w*k)/2,(s-h*k)/2,w*k,h*k);return t.toDataURL('image/jpeg',0.7)}

async function init(){db=await openDB();var sites=await all('s');site=sites[0]||{id:uid(),name:'Г§ВҸВҫГҘ Вҙ1',floors:['1Г©ВҡВҺ','2Г©ВҡВҺ','3Г©ВҡВҺ','ГҘВұВӢГӨВёВҠ','ГҘВӨВ–Г©ВғВЁ']};if(!sites.length)await put('s',site);await load();bind()}
function bind(){$('#gps').onclick=gps;$('#siteBtn').onclick=function(){alert(site.name)};$('#cam').onclick=start;$('#close').onclick=stop;$('#snap').onclick=take;$('#retryBtn').onclick=retry;$('#saveBtn').onclick=save;$('#pick').onclick=function(){$('#file').click()};$('#file').onchange=function(e){add(e.target.files)};$('#sel').onclick=toggle;document.querySelectorAll('[data-a]').forEach(function(b){b.onclick=function(){act(b.dataset.a)}})}

async function load(){photos=await bySite(site.id);photos.sort(function(a,b){return b.ts-a.ts});renderTabs();render()}
function renderTabs(){var t=$('#tabs');t.innerHTML='';site.floors.forEach(function(f){var b=document.createElement('button');b.className='tab'+(f===floor?' on':'');b.textContent=f;b.onclick=function(){floor=f;renderTabs();render()};t.appendChild(b)})}
function render(){var g=$('#grid');g.innerHTML='';var ls=photos.filter(function(p){return p.floor===floor});$('#cnt').textContent='('+ls.length+')';$('#empty').style.display=ls.length?'none':'block';ls.forEach(function(p){var d=document.createElement('div');d.className='pic';if(sel.has(p.id))d.classList.add('sel');var i=document.createElement('img');i.src=p.thumb;i.loading='lazy';d.appendChild(i);d.onclick=function(){if(selMode){if(sel.has(p.id))sel.delete(p.id);else sel.add(p.id);d.classList.toggle('sel')}else{var u=URL.createObjectURL(p.blob);window.open(u);setTimeout(function(){URL.revokeObjectURL(u)},2000)}};g.appendChild(d)})}

async function gps(){try{var p=await new Promise(function(res,rej){navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000})});site.lat=p.coords.latitude;site.lon=p.coords.longitude;await put('s',site);t('GPS OK')}catch(e){t('GPS fail')}}

async function start(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});$('#vid').srcObject=stream;await $('#vid').play();$('#vidW').style.display='block';$('#vid').style.display='block';$('#previewC').style.display='none';$('#snap').style.display='block';$('#retryBtn').style.display='none';$('#saveBtn').style.display='none'}catch(e){t('Camera error')}}
function stop(){if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}$('#vid').srcObject=null;$('#vidW').style.display='none';shot=null}
function take(){var v=$('#vid');var c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;var x=c.getContext('2d');x.drawImage(v,0,0);if($('#useBB').checked){var w=c.width,h=c.height,bw=w*0.33,bh=bw*0.68,px=w-bw-16,py=h-bh-16;x.fillStyle='rgba(0,0,0,.85)';x.fillRect(px,py,bw,bh);x.strokeStyle='#fff';x.lineWidth=3;x.strokeRect(px,py,bw,bh);x.fillStyle='#fff';x.font='bold '+Math.round(bw*0.09)+'px sans-serif';var ls=['ГҘВ·ВҘГӨВәВӢ:'+site.name,'ГҘВ·ВҘГ§ВЁВ®:'+$('#stat').value,'ГҘ ВҙГҰВүВҖ:'+floor,'ГҰВ—ВҘГҰВҷВӮ:'+new Date().toLocaleDateString('ja-JP')];for(var i=0;i<ls.length;i++)x.fillText(ls[i],px+10,py+14+i*20)}shot=c;$('#preview').src=c.toDataURL('image/jpeg',0.9);$('#vid').style.display='none';$('#previewC').style.display='block';$('#snap').style.display='none';$('#retryBtn').style.display='block';$('#saveBtn').style.display='block'}
function retry(){$('#vid').style.display='block';$('#previewC').style.display='none';$('#snap').style.display='block';$('#retryBtn').style.display='none';$('#saveBtn').style.display='none';shot=null}
async function save(){if(!shot)return;var b=await blob(shot),timg=thumb(shot);var p={id:uid(),sid:site.id,floor:floor,ts:Date.now(),blob:b,thumb:timg};await put('p',p);photos.unshift(p);render();t('ГӨВҝВқГҘВӯВҳ');stop()}

async function add(files){var n=0;for(var i=0;i<files.length;i++){var f=files[i];if(!f.type.startsWith('image'))continue;var im=await new Promise(function(r){var im=new Image();im.onload=function(){r(im)};im.src=URL.createObjectURL(f)});var c=document.createElement('canvas'),m=1600,w=im.width,h=im.height,s=Math.min(1,m/Math.max(w,h));c.width=w*s;c.height=h*s;c.getContext('2d').drawImage(im,0,0,c.width,c.height);var b=await blob(c),timg=thumb(c);await put('p',{id:uid(),sid:site.id,floor:floor,ts:Date.now(),blob:b,thumb:timg});n++;URL.revokeObjectURL(im.src)}if(n){await load();t(n+'ГҰВһВҡГЁВҝВҪГҘВҠ ')}}

function toggle(){selMode=!selMode;sel.clear();$('#sel').textContent=selMode?'ГЁВ§ВЈГ©ВҷВӨ':'Г©ВҒВёГҰВҠВһ';render()}
async function act(a){var ls=sel.size?photos.filter(function(p){return sel.has(p.id)}):photos.filter(function(p){return p.floor===floor});if(!ls.length){t('ГҘВҶВҷГ§ВңВҹГЈВҒВӘГЈВҒВ—');return}if(a==='del'){if(!sel.size){t('Г©ВҒВёГҰВҠВһГЈВҒВ—ГЈВҒВҰ');return}for(var i=0;i<ls.length;i++)await del('p',ls[i].id);photos=photos.filter(function(p){return !sel.has(p.id)});sel.clear();selMode=false;$('#sel').textContent='Г©ВҒВёГҰВҠВһ';render();t('ГҘВүВҠГ©ВҷВӨ')}else if(a==='zip'){if(!window.JSZip){await new Promise(function(r){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=r;document.head.appendChild(s)})}var z=new JSZip();ls.forEach(function(p,i){z.file((i+1)+'.jpg',p.blob)});var b=await z.generateAsync({type:'blob'});var u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='photos.zip';a.click();setTimeout(function(){URL.revokeObjectURL(u)},1000)}else if(a==='line'){var txt=site.name+' '+ls.length+'ГҰВһВҡ';if(site.lat)txt+=' https://maps.google.com/?q='+site.lat+','+site.lon;window.open('https://line.me/R/msg/text/?'+encodeURIComponent(txt))}else if(a==='print'){var w=window.open('','_blank');w.document.write('<html><body>');ls.forEach(function(p){w.document.write('<img src="'+p.thumb+'" style="width:100%;page-break-after:always">')});w.document.write('</body></html>');w.print()}}

init();
}();
</script>
