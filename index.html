<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>現場PRO完成</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif}
header{position:sticky;top:0;background:#000;padding:10px}
button,input,select{margin:4px;padding:8px}
#tabs{display:flex;overflow:auto}
.tab{padding:5px 10px;background:#333;margin-right:5px;cursor:pointer}
.active{background:#0a84ff}
#photos{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
img{width:100%}
</style>
</head>

<body>

<header>

<input type="file" id="cam" accept="image/*" capture="environment" multiple><br>

<select id="floor"></select>
<select id="status"></select>

<button onclick="getGPS()">GPS</button>
<button onclick="zipDownload()">ZIP</button>
<button onclick="shareLine()">LINE</button>

</header>

<div id="tabs"></div>
<div id="photos"></div>

<script>

let db, currentSite=null, sites=[];

// ================= DB =================
function initDB(){
 let r=indexedDB.open("pro",1);
 r.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("p",{keyPath:"id",autoIncrement:true});
 };
 r.onsuccess=e=>{
  db=e.target.result;
  load();
 };
}

// ================= GPS =================
let lastPos=null;

function getGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  lastPos=p.coords;
  alert("GPS取得OK");
 },()=>alert("失敗"),{enableHighAccuracy:true,timeout:3000});
}

// ================= 距離計算 =================
function dist(a,b){
 let dx=a.lat-b.lat;
 let dy=a.lon-b.lon;
 return Math.sqrt(dx*dx+dy*dy)*111000;
}

// ================= 保存 =================
cam.onchange=e=>{
 for(let f of e.target.files){
  let r=new FileReader();
  r.onload=ev=>{
   let siteId="unknown";

   if(lastPos){
    let found=sites.find(s=>dist(s,lastPos)<15);
    if(found){
     siteId=found.id;
    }else{
     siteId="site_"+Date.now();
     sites.push({id:siteId,lat:lastPos.latitude,lon:lastPos.longitude});
    }
   }

   save({
    img:ev.target.result,
    site:siteId,
    floor:floor.value,
    status:status.value
   });

   load();
  };
  r.readAsDataURL(f);
 }
};

// ================= 保存 =================
function save(p){
 let tx=db.transaction("p","readwrite");
 tx.objectStore("p").add(p);
}

// ================= 読み込み =================
function load(){
 let tx=db.transaction("p","readonly");
 let r=tx.objectStore("p").getAll();
 r.onsuccess=()=>render(r.result);
}

// ================= 描画 =================
function render(list){

 let tabBox=document.getElementById("tabs");
 let photoBox=document.getElementById("photos");

 tabBox.innerHTML="";
 photoBox.innerHTML="";

 let grouped={};

 list.forEach(p=>{
  if(!grouped[p.site])grouped[p.site]=[];
  grouped[p.site].push(p);
 });

 Object.keys(grouped).forEach(site=>{

  let t=document.createElement("div");
  t.className="tab"+(site==currentSite?" active":"");
  t.textContent=site;
  t.onclick=()=>{currentSite=site;render(list)};
  tabBox.appendChild(t);

 });

 if(!currentSite) currentSite=Object.keys(grouped)[0];

 let data=grouped[currentSite]||[];

 data.forEach(p=>{
  let img=document.createElement("img");
  img.src=p.img;
  photoBox.appendChild(img);
 });

}

// ================= ZIP =================
async function zipDownload(){
 let zip=new JSZip();
 let tx=db.transaction("p","readonly");
 let r=tx.objectStore("p").getAll();

 r.onsuccess=()=>{
  r.result.forEach((p,i)=>{
   zip.file("p"+i+".jpg",p.img.split(",")[1],{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(b=>{
   let a=document.createElement("a");
   a.href=URL.createObjectURL(b);
   a.download="photos.zip";
   a.click();
  });
 };
}

// ================= LINE =================
function shareLine(){
 window.open("https://line.me/R/msg/text/?写真ZIP送信");
}

// ================= 選択 =================
function loadSel(){
 ["floor","status"].forEach(t=>{
  let s=document.getElementById(t);
  s.innerHTML="";
  let d=JSON.parse(localStorage[t]||"[]");

  if(d.length==0){
   d=(t=="floor"?["1階","2階"]:["施工前","施工後"]);
  }

  d.forEach(v=>{
   let o=document.createElement("option");
   o.text=v;
   s.add(o);
  });
 });
}

initDB();
loadSel();

</script>
</body>
</html>
