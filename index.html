<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>現場写真アプリ 完全版</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #222;
  color: #fff;
  padding: 10px;
  text-align: center;
}

.controls {
  padding: 10px;
  background: #fff;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

select, input, button {
  padding: 10px;
  font-size: 16px;
}

button {
  background: #007aff;
  color: white;
  border: none;
  border-radius: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 5px;
}

.photo {
  position: relative;
}

.photo img {
  width: 100%;
  border-radius: 5px;
}

.label {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 10px;
  width: 100%;
  text-align: center;
}

.delete {
  position: absolute;
  top: 0;
  right: 0;
  background: red;
  color: white;
  border: none;
}
</style>
</head>

<body>

<header>現場写真アプリ（完全版）</header>

<div class="controls">

<input id="siteName" placeholder="現場名">

<input id="address" placeholder="住所（編集可）">

<input id="date" type="date">

<select id="floor"></select>
<button onclick="editFloor()">階層編集</button>

<select id="tag"></select>
<button onclick="editTag()">定型文編集</button>

<input type="file" accept="image/*" capture="environment" multiple onchange="addPhoto(event)">

<button onclick="startBurst()">連続撮影ON</button>
<button onclick="stopBurst()">連続撮影OFF</button>

<button onclick="shareLine()">LINE共有</button>
<button onclick="shareMail()">メール送信</button>
<button onclick="printPhotos()">印刷</button>

</div>

<div class="grid" id="photos"></div>

<script>

// ===== 初期設定 =====
let floors = JSON.parse(localStorage.getItem("floors")) || ["1階","2階"];
let tags = JSON.parse(localStorage.getItem("tags")) || ["施工前","施工後"];

let photos = [];
let burstMode = false;

// ===== UI初期化 =====
function refreshUI(){
  let f = document.getElementById("floor");
  let t = document.getElementById("tag");

  f.innerHTML = floors.map(v=>`<option>${v}</option>`).join("");
  t.innerHTML = tags.map(v=>`<option>${v}</option>`).join("");
}

refreshUI();

// ===== 編集 =====
function editFloor(){
  let txt = prompt("階層をカンマ区切りで入力", floors.join(","));
  if(txt){
    floors = txt.split(",");
    localStorage.setItem("floors", JSON.stringify(floors));
    refreshUI();
  }
}

function editTag(){
  let txt = prompt("定型文をカンマ区切りで入力", tags.join(","));
  if(txt){
    tags = txt.split(",");
    localStorage.setItem("tags", JSON.stringify(tags));
    refreshUI();
  }
}

// ===== 写真追加 =====
function addPhoto(e){
  let files = e.target.files;

  for(let file of files){
    let reader = new FileReader();

    reader.onload = function(){
      let obj = {
        src: reader.result,
        floor: document.getElementById("floor").value,
        tag: document.getElementById("tag").value,
        date: document.getElementById("date").value,
        address: document.getElementById("address").value,
        site: document.getElementById("siteName").value
      };

      photos.push(obj);
      render();
    };

    reader.readAsDataURL(file);
  }

  if(!burstMode){
    e.target.value = "";
  }
}

// ===== 表示 =====
function render(){
  let box = document.getElementById("photos");
  box.innerHTML = "";

  photos.forEach((p,i)=>{
    box.innerHTML += `
    <div class="photo">
      <img src="${p.src}">
      <div class="label">${p.floor} / ${p.tag}</div>
      <button class="delete" onclick="del(${i})">×</button>
    </div>
    `;
  });
}

// ===== 削除 =====
function del(i){
  if(confirm("削除する？")){
    photos.splice(i,1);
    render();
  }
}

// ===== 連続撮影 =====
function startBurst(){
  burstMode = true;
  alert("連続撮影ON");
}

function stopBurst(){
  burstMode = false;
  alert("連続撮影OFF");
}

// ===== 印刷 =====
function printPhotos(){
  let win = window.open("");
  let html = photos.map(p=>`
    <div style="page-break-after:always">
      <img src="${p.src}" style="width:100%">
      <p>${p.site}</p>
      <p>${p.address}</p>
      <p>${p.date}</p>
      <p>${p.floor} / ${p.tag}</p>
    </div>
  `).join("");

  win.document.write(html);
  win.print();
}

// ===== LINE共有 =====
function shareLine(){
  alert("LINEは画像まとめ送信不可。1枚ずつ共有になります");
}

// ===== メール =====
function shareMail(){
  window.location.href = "mailto:?subject=現場写真";
}

// ===== GPS =====
navigator.geolocation.getCurrentPosition(pos=>{
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("address").value = d.display_name;
  });
});

</script>

</body>
</html>
