<!-- 変更点だけじゃなくフルで出す（安全） -->
<!-- ★変更箇所には【NEW】コメント入れてる -->

<script>
'use strict';

var $=s=>document.querySelector(s);
var $$=s=>[...document.querySelectorAll(s)];

function toast(m){
  var t=$('#toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1600)
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6)
}

var db=null,sites=[],cur=null,photos=[],sel=new Set(),selMode=false,floor='1階',stream=null;

var bb={pos:'br',sz:'m'};
try{bb=Object.assign(bb,JSON.parse(localStorage.bb||'{}'))}catch(e){}

/* =========================
   DB
========================= */
function openDB(){
  return new Promise((res,rej)=>{
    var r=indexedDB.open('genba_v19',2); // ★verアップ

    r.onupgradeneeded=e=>{
      var d=e.target.result;

      if(!d.objectStoreNames.contains('sites'))
        d.createObjectStore('sites',{keyPath:'id'});

      if(!d.objectStoreNames.contains('photos')){
        var p=d.createObjectStore('photos',{keyPath:'id'});
        p.createIndex('siteId','siteId');
      }
    };

    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  })
}

function tx(n,m='readonly'){
  return db.transaction(n,m).objectStore(n)
}

function all(n){
  return new Promise(r=>{
    var q=tx(n).getAll();
    q.onsuccess=()=>r(q.result||[])
  })
}

function bySite(id){
  return new Promise(r=>{
    var q=tx('photos').index('siteId').getAll(id);
    q.onsuccess=()=>r(q.result||[])
  })
}

function put(n,o){
  return new Promise(res=>{
    let retry=0;
    function run(){
      var q=tx(n,'readwrite').put(o);
      q.onsuccess=()=>res(true);
      q.onerror=()=>{
        retry++;
        if(retry<3) setTimeout(run,100*retry);
        else{
          toast('保存失敗');
          res(false);
        }
      }
    }
    run();
  })
}

/* =========================
   Blob変換（NEW）
========================= */
function canvasToBlob(canvas){
  return new Promise(r=>{
    canvas.toBlob(b=>r(b),'image/jpeg',0.85);
  })
}

function createThumb(canvas){
  var c=document.createElement('canvas');
  var size=300;
  c.width=size;
  c.height=size;
  var ctx=c.getContext('2d');

  var w=canvas.width,h=canvas.height;
  var scale=Math.min(size/w,size/h);
  var nw=w*scale,nh=h*scale;

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,size,size);
  ctx.drawImage(canvas,(size-nw)/2,(size-nh)/2,nw,nh);

  return c.toDataURL('image/jpeg',0.6);
}

/* =========================
   カメラ
========================= */
async function startCam(){
  if(!cur){
    toast('現場選択');
    return;
  }

  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment'},
      audio:false
    });

    var v=$('#vid');
    v.srcObject=stream;
    await v.play();
    $('#vidW').style.display='block';

  }catch(e){
    toast('カメラNG');
  }
}

function stopCam(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
  }
  $('#vidW').style.display='none';
}

/* =========================
   撮影（完全改良）
========================= */
async function takePhoto(){

  var v=$('#vid');
  if(!v.videoWidth)return;

  var c=document.createElement('canvas');
  c.width=v.videoWidth;
  c.height=v.videoHeight;

  var ctx=c.getContext('2d');
  ctx.drawImage(v,0,0);

  /* 黒板 */
  if($('#useBB').checked){
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.fillRect(20,20,300,150);

    ctx.fillStyle='#fff';
    ctx.fillText(cur.name,30,40);
  }

  // ★Blob化
  var blob=await canvasToBlob(c);

  // ★サムネ
  var thumb=createThumb(c);

  var p={
    id:uid(),
    siteId:cur.id,
    floor:floor,
    ts:Date.now(),

    blob:blob,        // NEW
    thumb:thumb       // NEW
  };

  if(await put('photos',p)){
    photos.unshift(p);
    renderPhotos();
    toast('撮影OK');
  }
}

/* =========================
   描画（高速化）
========================= */
function renderPhotos(){

  var g=$('#grid');
  g.innerHTML='';

  var list=photos.filter(p=>p.floor===floor);

  list.forEach(p=>{

    var d=document.createElement('div');
    d.className='pic';

    var img=document.createElement('img');

    // ★優先：サムネ
    if(p.thumb){
      img.src=p.thumb;
    }
    else if(p.data){
      img.src=p.data; // 旧互換
    }

    // ★クリックで本体表示
    d.onclick=()=>{
      if(p.blob){
        var url=URL.createObjectURL(p.blob);
        window.open(url,'_blank');
        setTimeout(()=>URL.revokeObjectURL(url),3000);
      }else{
        window.open(p.data,'_blank');
      }
    }

    d.appendChild(img);
    g.appendChild(d);

  });
}

/* =========================
   ZIP（Blob対応）
========================= */
async function zipExport(list){

  if(!window.JSZip){
    await new Promise(r=>{
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=r;
      document.head.appendChild(s);
    });
  }

  var zip=new JSZip();

  for(let i=0;i<list.length;i++){

    let p=list[i];

    if(p.blob){
      zip.file(i+'.jpg',p.blob);
    }
    else{
      let b64=p.data.split(',')[1];
      zip.file(i+'.jpg',b64,{base64:true});
    }
  }

  var blob=await zip.generateAsync({type:'blob'});

  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='photos.zip';
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* =========================
   初期化
========================= */
async function init(){
  db=await openDB();
  sites=await all('sites');
}

init();

</script>
