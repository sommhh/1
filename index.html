<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>写真ログ 完全版+</title>

<style>
body{font-family:sans-serif;margin:0;background:#f2f2f7}
header{background:#007aff;color:#fff;padding:12px}

.bigbtn{
width:100%;
padding:20px;
font-size:20px;
border-radius:12px;
background:#007aff;
color:#fff;
border:none;
margin:5px 0;
}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:#fff;border-radius:10px;overflow:hidden}
.card img{width:100%;aspect-ratio:1;object-fit:cover}
.sel{outline:3px solid blue}

</style>
</head>

<body>

<header>📷 写真ログ 完全版+</header>

<div style="padding:10px">

<label class="bigbtn">
📷 撮る
<input type="file" id="file" accept="image/*" capture="environment" hidden>
</label>

<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="editTpl()">定型文編集</button>
<div id="tpl"></div>

<button class="bigbtn" onclick="save()">保存</button>

</div>

<div id="folders"></div>

<script>

let photos=JSON.parse(localStorage.getItem("p")||"[]")
let tpl=JSON.parse(localStorage.getItem("tpl")||JSON.stringify([
"施工前","施工後","完了","問題なし","要確認",
"OK","NG","注意","写真のみ","報告"
]))

let lastGPS=null

// GPSキャッシュ
function getGPSFast(){
return new Promise((res)=>{
if(lastGPS){res(lastGPS)}
navigator.geolocation.getCurrentPosition(p=>{
lastGPS=p
res(p)
},()=>res(null))
})
}

// 保存
async function save(){
let f=document.getElementById("file").files[0]
if(!f)return alert("写真選択")

let reader=new FileReader()
reader.onload=async e=>{
let img=e.target.result
let memo=document.getElementById("memo").value

let date=new Date().toISOString()

let lat=null,lng=null
let pos=await getGPSFast()
if(pos){
lat=pos.coords.latitude
lng=pos.coords.longitude
}

photos.push({
id:Date.now(),
img,memo,lat,lng,date
})

localStorage.setItem("p",JSON.stringify(photos))
render()
}

reader.readAsDataURL(f)
}

// 定型文
function renderTpl(){
let el=document.getElementById("tpl")
el.innerHTML=""
tpl.forEach(t=>{
let b=document.createElement("button")
b.textContent=t
b.onclick=()=>memo.value+=t+"\n"
el.appendChild(b)
})
}

function editTpl(){
let t=prompt("10個をカンマ区切りで",tpl.join(","))
if(!t)return
tpl=t.split(",").slice(0,10)
localStorage.setItem("tpl",JSON.stringify(tpl))
renderTpl()
}

// 削除
function del(id){
if(!confirm("削除？"))return
photos=photos.filter(p=>p.id!==id)
localStorage.setItem("p",JSON.stringify(photos))
render()
}

// 編集
function edit(p){
let m=prompt("メモ",p.memo)
let d=prompt("日付",p.date)
p.memo=m
p.date=d
localStorage.setItem("p",JSON.stringify(photos))
render()
}

// 描画
function render(){
let wrap=document.getElementById("folders")
wrap.innerHTML=""

photos.forEach(p=>{
let c=document.createElement("div")
c.className="card"

c.innerHTML=`
<img src="${p.img}">
<div>${p.memo}</div>
<button onclick="edit(${JSON.stringify(p)})">編集</button>
<button onclick="del(${p.id})">削除</button>
`

wrap.appendChild(c)
})
}

renderTpl()
render()

</script>

</body>
</html>
