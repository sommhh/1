<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>現場写真PRO 最終完成</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif}
header{position:sticky;top:0;background:#000;padding:10px;z-index:10}

input{width:100%;box-sizing:border-box;margin:4px 0;padding:10px;font-size:15px;border-radius:6px;border:none}
select,button{margin:4px;padding:10px;font-size:14px;border-radius:6px;border:none}

#tabs{display:flex;overflow:auto;margin-top:6px}
.tab{padding:8px 12px;background:#333;margin-right:6px;border-radius:8px}
.active{background:#0a84ff}

.groupTitle{font-size:14px;padding:6px;margin-top:10px;background:#222;border-radius:6px}

#photos{padding:6px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

.card{background:#222;border-radius:8px;padding:4px}
img{width:100%;border-radius:6px}
.sel{outline:3px solid #ff3b30}
</style>
</head>

<body>

<header>

<input type="file" id="cam" accept="image/*" capture="environment" multiple>

<input id="siteName" placeholder="現場名">
<input id="addr" placeholder="住所">

<select id="floor"></select>
<select id="status"></select>

<button onclick="editList('floor')">階層</button>
<button onclick="editList('status')">定型</button>

<br>
<button onclick="getAddress()">住所取得</button>
<button onclick="deleteSelected()">削除</button>
<button onclick="printSelected()">選択印刷</button>
<button onclick="downloadZip()">ZIP</button>
<button onclick="shareLine()">LINE</button>

<div id="tabs"></div>

</header>

<div id="photos"></div>

<script>

let db;
let currentSite=null;
let selectedIds=[];

// ===== DB =====
function initDB(){
 let r=indexedDB.open("genbaDB",1);
 r.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("photos",{keyPath:"id",autoIncrement:true});
 };
 r.onsuccess=e=>{
  db=e.target.result;
  load();
 };
}

// ===== 住所取得（完全版） =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;

  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
  .then(r=>r.json())
  .then(d=>{
   let a=d.address||{};

   let result=[
     a.city||a.town||a.village||"",
     a.suburb||a.neighbourhood||"",
     a.road||"",
     a.block||"",
     a.house_number||""
   ].join("");

   result=result.replace(/丁目/g,"-")
                .replace(/日本/g,"")
                .replace(/〒\d{3}-?\d{4}/g,"")
                .replace(/東京都|北海道|大阪府|京都府|.+県/g,"")
                .replace(/\s+/g,"")
                .trim();

   addr.value=result||"住所取得失敗";
  });

 },()=>alert("GPS失敗"),{enableHighAccuracy:true,timeout:2000});
}

// ===== 保存 =====
cam.onchange=e=>{
 for(let f of e.target.files){
  let r=new FileReader();
  r.onload=ev=>{
   let site=(siteName.value||"未設定")+"_"+(addr.value||"住所なし");

   let tx=db.transaction("photos","readwrite");
   tx.objectStore("photos").add({
    img:ev.target.result,
    site:site,
    floor:floor.value,
    status:status.value
   });

   tx.oncomplete=load;
  };
  r.readAsDataURL(f);
 }
};

// ===== 読込 =====
function load(){
 let tx=db.transaction("photos","readonly");
 let r=tx.objectStore("photos").getAll();
 r.onsuccess=()=>render(r.result);
}

// ===== 描画 =====
function render(list){

 let tabs=document.getElementById("tabs");
 let photos=document.getElementById("photos");

 tabs.innerHTML="";
 photos.innerHTML="";

 let grouped={};

 list.forEach(p=>{
  if(!grouped[p.site])grouped[p.site]=[];
  grouped[p.site].push(p);
 });

 let keys=Object.keys(grouped);
 if(!currentSite) currentSite=keys[0];

 keys.forEach(k=>{
  let t=document.createElement("div");
  t.className="tab"+(k==currentSite?" active":"");
  t.textContent=k;
  t.onclick=()=>{currentSite=k;render(list);};
  tabs.appendChild(t);
 });

 let floors={};

 (grouped[currentSite]||[]).forEach(p=>{
  if(!floors[p.floor])floors[p.floor]=[];
  floors[p.floor].push(p);
 });

 Object.keys(floors).forEach(f=>{

  let title=document.createElement("div");
  title.className="groupTitle";
  title.textContent="🏢 "+f;
  photos.appendChild(title);

  let grid=document.createElement("div");
  grid.className="grid";

  floors[f].forEach(p=>{
   let d=document.createElement("div");
   d.className="card";

   let img=document.createElement("img");
   img.src=p.img;

   if(selectedIds.includes(p.id)) img.classList.add("sel");

   img.onclick=()=>{
    if(selectedIds.includes(p.id)){
     selectedIds=selectedIds.filter(x=>x!==p.id);
     img.classList.remove("sel");
    }else{
     selectedIds.push(p.id);
     img.classList.add("sel");
    }
   };

   d.appendChild(img);
   grid.appendChild(d);
  });

  photos.appendChild(grid);
 });
}

// ===== 削除 =====
function deleteSelected(){
 if(selectedIds.length===0){alert("選択なし");return;}
 let tx=db.transaction("photos","readwrite");
 let store=tx.objectStore("photos");
 selectedIds.forEach(id=>store.delete(id));
 tx.oncomplete=()=>{selectedIds=[];load();}
}

// ===== 選択印刷 =====
function printSelected(){
 if(selectedIds.length===0){alert("選択して");return;}

 let tx=db.transaction("photos","readonly");
 let r=tx.objectStore("photos").getAll();

 r.onsuccess=()=>{
  let list=r.result.filter(p=>selectedIds.includes(p.id));

  let w=window.open("");
  let html="<html><body>";

  list.forEach(p=>{
   html+=`<img src="${p.img}" style="width:100%;page-break-after:always">`;
  });

  html+="</body></html>";

  w.document.write(html);
  w.document.close();
  w.print();
 };
}

// ===== ZIP =====
function downloadZip(){
 let zip=new JSZip();

 let tx=db.transaction("photos","readonly");
 let r=tx.objectStore("photos").getAll();

 r.onsuccess=()=>{
  r.result.forEach((p,i)=>{
   zip.file("p"+i+".jpg",p.img.split(",")[1],{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(b=>{
   let a=document.createElement("a");
   a.href=URL.createObjectURL(b);
   a.download="photos.zip";
   a.click();
  });
 };
}

// ===== LINE =====
function shareLine(){
 window.open("https://line.me/R/msg/text/?写真送信");
}

// ===== 編集 =====
function editList(type){
 let d=JSON.parse(localStorage[type]||"[]");
 let t=prompt("カンマ区切り",d.join(","));
 if(!t)return;
 localStorage[type]=JSON.stringify(t.split(","));
 loadSelect();
}

// ===== 初期 =====
function loadSelect(){
 ["floor","status"].forEach(t=>{
  let s=document.getElementById(t);
  s.innerHTML="";
  let d=JSON.parse(localStorage[t]||"[]");

  if(d.length===0){
   d=(t==="floor")?["1階","2階","屋上"]:["施工前","施工中","施工後"];
  }

  d.forEach(v=>{
   let o=document.createElement("option");
   o.text=v;
   s.add(o);
  });
 });
}

initDB();
loadSelect();

</script>

</body>
</html>
