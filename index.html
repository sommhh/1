<!-- ⚠️ HEAD〜HTMLはそのまま使え（変更なし） -->

<script>
(function(){
'use strict';

/* =========================
  安全ユーティリティ
========================= */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function safe(fn){
  try{ fn(); }catch(e){ console.error(e); toast('エラー'); }
}

function toast(m){
  const t = $('#toast');
  if(!t) return;
  t.textContent = m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}

/* =========================
  DB（安定化）
========================= */
let db, sites=[], cur=null, photos=[];
let sel=new Set(), selMode=false, floor='1階';
let stream=null, currentPhoto=null;

async function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('genba_final',3);

    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('sites'))
        d.createObjectStore('sites',{keyPath:'id'});
      if(!d.objectStoreNames.contains('photos')){
        const p=d.createObjectStore('photos',{keyPath:'id'});
        p.createIndex('siteId','siteId');
      }
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}

function tx(n,m='readonly'){
  return db.transaction(n,m).objectStore(n);
}

function getAll(n){
  return new Promise(r=>{
    const q=tx(n).getAll();
    q.onsuccess=()=>r(q.result||[]);
    q.onerror=()=>r([]);
  });
}

function getBySite(id){
  return new Promise(r=>{
    const q=tx('photos').index('siteId').getAll(id);
    q.onsuccess=()=>r(q.result||[]);
    q.onerror=()=>r([]);
  });
}

function put(n,o){
  return new Promise(r=>{
    const q=tx(n,'readwrite').put(o);
    q.onsuccess=()=>r(true);
    q.onerror=()=>r(false);
  });
}

function del(n,id){
  return new Promise(r=>{
    const q=tx(n,'readwrite').delete(id);
    q.onsuccess=()=>r();
    q.onerror=()=>r();
  });
}

/* =========================
  画像処理（強化）
========================= */
function canvasToBlob(c){
  return new Promise(r=>{
    c.toBlob(b=>r(b),'image/jpeg',0.85);
  });
}

function makeThumb(c){
  const t=document.createElement('canvas');
  const size=300;
  t.width=size; t.height=size;

  const ctx=t.getContext('2d');
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,size,size);

  const s=Math.min(size/c.width,size/c.height);
  const nw=c.width*s, nh=c.height*s;

  ctx.drawImage(c,(size-nw)/2,(size-nh)/2,nw,nh);
  return t.toDataURL('image/jpeg',0.6);
}

/* =========================
  初期化（完全安定）
========================= */
async function init(){
  try{
    db=await openDB();
    sites=await getAll('sites');

    const saved=localStorage.getItem('cur');
    cur=sites.find(s=>s.id===saved)||sites[0]||null;

    bindEvents();

    if(cur) await loadSite();

  }catch(e){
    console.error(e);
    toast('初期化エラー');
  }
}

/* =========================
  イベント（安全）
========================= */
function bindEvents(){
  safe(()=>$('#camBtn').onclick=startCam);
  safe(()=>$('#snap').onclick=capturePhoto);
  safe(()=>$('#closeV').onclick=closeCam);
}

/* =========================
  カメラ（完全安定）
========================= */
async function startCam(){
  if(!cur){ toast('現場選択'); return; }

  try{
    if(location.protocol!=='https:' && location.hostname!=='localhost'){
      toast('HTTPS必須'); return;
    }

    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment'}, audio:false
    });

    const v=$('#vid');
    v.srcObject=stream;
    await v.play();

    $('#vidW').style.display='block';

  }catch(e){
    console.error(e);
    toast('カメラNG');
  }
}

function closeCam(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
  }
  $('#vidW').style.display='none';
}

/* =========================
  撮影
========================= */
async function capturePhoto(){
  const v=$('#vid');
  if(!v.videoWidth){ toast('準備中'); return; }

  const c=document.createElement('canvas');
  c.width=v.videoWidth;
  c.height=v.videoHeight;

  c.getContext('2d').drawImage(v,0,0);
  currentPhoto=c;

  const blob=await canvasToBlob(c);
  const thumb=makeThumb(c);

  const p={
    id:uid(),
    siteId:cur.id,
    floor:floor,
    status:$('#stat')?.value||'',
    ts:Date.now(),
    blob, thumb
  };

  if(await put('photos',p)){
    photos.unshift(p);
    renderPhotos();
    toast('保存OK');
  }
}

/* =========================
  表示（高速）
========================= */
function renderPhotos(){
  const g=$('#grid');
  if(!g) return;

  g.innerHTML='';

  const list=photos.filter(p=>p.floor===floor);

  list.forEach(p=>{
    const d=document.createElement('div');
    d.className='pic';

    const img=document.createElement('img');
    img.loading='lazy';
    img.src=p.thumb||'';

    d.onclick=()=>{
      if(p.blob){
        const url=URL.createObjectURL(p.blob);
        window.open(url);
        setTimeout(()=>URL.revokeObjectURL(url),2000);
      }
    };

    d.appendChild(img);
    g.appendChild(d);
  });
}

/* =========================
  サイト読込
========================= */
async function loadSite(){
  localStorage.setItem('cur',cur.id);
  photos=await getBySite(cur.id);
  photos.sort((a,b)=>b.ts-a.ts);
  renderPhotos();
}

/* =========================
  起動
========================= */
init();

})();
</script>
