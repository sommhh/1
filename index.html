<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>現場写真 完成版PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif}
header{position:sticky;top:0;background:#000;padding:10px}
button,input,select{margin:4px;padding:8px;font-size:14px}
#tabs{display:flex;overflow:auto}
.tab{padding:6px 10px;background:#333;margin-right:5px}
.active{background:#0a84ff}
#photos{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
img{width:100%}
</style>
</head>

<body>

<header>

<input type="file" id="cam" accept="image/*" capture="environment" multiple><br>

現場名 <input id="siteName" placeholder="現場名">
住所 <input id="addr">

<br>

<select id="floor"></select>
<select id="status"></select>

<button onclick="editList('floor')">階層編集</button>
<button onclick="editList('status')">定型編集</button>

<br>
<button onclick="getAddress()">住所取得</button>
<button onclick="downloadZip()">ZIP</button>
<button onclick="shareLine()">LINE</button>
<button onclick="print()">印刷</button>

<div id="tabs"></div>

</header>

<div id="photos"></div>

<script>

let db, currentSite=null;

// ===== DB =====
function initDB(){
 let r=indexedDB.open("proFinal",1);
 r.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("photos",{keyPath:"id",autoIncrement:true});
 };
 r.onsuccess=e=>{
  db=e.target.result;
  load();
 };
}

// ===== 住所（爆速） =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(p=>{
  let lat=p.coords.latitude;
  let lon=p.coords.longitude;

  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
  .then(r=>r.json())
  .then(d=>{
   addr.value=d.display_name || "住所不明";
  });

 },()=>alert("GPS失敗"),{enableHighAccuracy:true,timeout:2000});
}

// ===== 保存 =====
cam.onchange=e=>{
 for(let f of e.target.files){
  let r=new FileReader();

  r.onload=ev=>{
   let site = siteName.value || "未設定";
   let key = site + "_" + addr.value;

   let tx=db.transaction("photos","readwrite");
   tx.objectStore("photos").add({
    img:ev.target.result,
    site:key,
    floor:floor.value,
    status:status.value,
    date:new Date().toLocaleString()
   });

   tx.oncomplete=load;
  };

  r.readAsDataURL(f);
 }
};

// ===== 読み込み =====
function load(){
 let tx=db.transaction("photos","readonly");
 let r=tx.objectStore("photos").getAll();
 r.onsuccess=()=>render(r.result);
}

// ===== 描画 =====
function render(list){

 let tabs=document.getElementById("tabs");
 let photos=document.getElementById("photos");

 tabs.innerHTML="";
 photos.innerHTML="";

 let group={};

 list.forEach(p=>{
  if(!group[p.site])group[p.site]=[];
  group[p.site].push(p);
 });

 let keys=Object.keys(group);
 if(!currentSite) currentSite=keys[0];

 keys.forEach(k=>{
  let t=document.createElement("div");
  t.className="tab"+(k==currentSite?" active":"");
  t.textContent=k;
  t.onclick=()=>{currentSite=k;render(list)};
  tabs.appendChild(t);
 });

 (group[currentSite]||[]).forEach(p=>{
  let img=document.createElement("img");
  img.src=p.img;
  photos.appendChild(img);
 });
}

// ===== ZIP =====
function downloadZip(){
 let zip=new JSZip();

 let tx=db.transaction("photos","readonly");
 let r=tx.objectStore("photos").getAll();

 r.onsuccess=()=>{
  r.result.forEach((p,i)=>{
   zip.file("p"+i+".jpg",p.img.split(",")[1],{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(b=>{
   let a=document.createElement("a");
   a.href=URL.createObjectURL(b);
   a.download="photos.zip";
   a.click();
  });
 };
}

// ===== LINE =====
function shareLine(){
 window.open("https://line.me/R/msg/text/?写真送信");
}

// ===== 編集 =====
function editList(type){
 let data=JSON.parse(localStorage[type]||"[]");
 let txt=prompt("カンマ区切りで入力",data.join(","));
 if(!txt)return;
 localStorage[type]=JSON.stringify(txt.split(","));
 loadSelect();
}

// ===== 初期 =====
function loadSelect(){
 ["floor","status"].forEach(t=>{
  let s=document.getElementById(t);
  s.innerHTML="";
  let d=JSON.parse(localStorage[t]||"[]");

  if(d.length==0){
   d=(t=="floor"?["1階","2階","屋上"]:["施工前","施工中","施工後"]);
  }

  d.forEach(v=>{
   let o=document.createElement("option");
   o.text=v;
   s.add(o);
  });
 });
}

initDB();
loadSelect();

</script>

</body>
</html>
