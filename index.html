<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>現場カメラ PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system;background:#0f172a;color:#e2e8f0}
header{position:sticky;top:0;background:#0f172a;border-bottom:1px solid #334155}
.hd{display:flex;gap:10px;padding:12px}
.btn{padding:8px 10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff}
.btn.p{background:#2563eb}
main{padding:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pic{aspect-ratio:1;background:#000;border-radius:6px;overflow:hidden}
.pic img{width:100%;height:100%;object-fit:cover}
#vidW{display:none;background:#000}
video{width:100%}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;padding:8px 12px;border-radius:8px;opacity:0;transition:.2s}
.toast.show{opacity:1}
</style>
</head>

<body>

<header>
<div class="hd">
<button class="btn p" id="gpsBtn">GPS</button>
<button class="btn" id="camBtn">撮影</button>
<button class="btn" id="zipBtn">ZIP</button>
</div>
</header>

<main>

<div id="vidW">
<video id="vid" autoplay playsinline muted></video>
<button id="snap">撮影</button>
<button id="closeV">閉じる</button>
</div>

<div class="grid" id="grid"></div>

</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ===== Utils ===== */
const $=s=>document.querySelector(s);
const toast=m=>{
 const t=$('#toast');
 t.textContent=m;
 t.classList.add('show');
 setTimeout(()=>t.classList.remove('show'),1500);
};
const uid=()=>Date.now()+Math.random();

/* ===== State ===== */
let db,photos=[],stream=null;

/* ===== DB ===== */
async function initDB(){
 return new Promise(res=>{
  const r=indexedDB.open('genba_final',1);
  r.onupgradeneeded=e=>{
    const d=e.target.result;
    d.createObjectStore('p',{keyPath:'id'});
  };
  r.onsuccess=()=>res(r.result);
 });
}
const save=async o=>{
 return new Promise(r=>{
  const q=db.transaction('p','readwrite').objectStore('p').put(o);
  q.onsuccess=()=>r();
 });
};
const load=async()=>{
 return new Promise(r=>{
  const q=db.transaction('p').objectStore('p').getAll();
  q.onsuccess=()=>r(q.result||[]);
 });
};

/* ===== Camera ===== */
async function startCamera(){
 if(stream){stopCamera(); await new Promise(r=>setTimeout(r,200));}

 try{
  if(location.protocol!=='https:'&&location.hostname!=='localhost'){
   toast('HTTPS必要');
   return;
  }

  stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:'environment',width:{ideal:1280}}
  });

  const v=$('#vid');
  v.srcObject=stream;
  await v.play().catch(()=>{});

  $('#vidW').style.display='block';

 }catch(e){
  toast('カメラNG');
 }
}

function stopCamera(){
 if(stream){
  stream.getTracks().forEach(t=>t.stop());
  stream=null;
 }
 $('#vid').srcObject=null;
 $('#vidW').style.display='none';
}

/* ===== Photo ===== */
async function takePhoto(){
 const v=$('#vid');
 if(!v.videoWidth){toast('準備中');return;}

 const c=document.createElement('canvas');
 const max=1600;

 let w=v.videoWidth,h=v.videoHeight;
 const s=Math.min(1,max/Math.max(w,h));
 w*=s;h*=s;

 c.width=w;c.height=h;
 c.getContext('2d').drawImage(v,0,0,w,h);

 const data=c.toDataURL('image/jpeg',0.8);

 const p={id:uid(),data};
 await save(p);

 photos.unshift(p);
 render();

 toast('撮影');
}

/* ===== Render ===== */
function render(){
 const g=$('#grid');
 g.innerHTML='';

 photos.slice(0,100).forEach(p=>{
  const d=document.createElement('div');
  d.className='pic';
  d.innerHTML=`<img src="${p.data}">`;
  g.appendChild(d);
 });
}

/* ===== ZIP ===== */
async function makeZip(){
 toast('ZIP作成');

 if(!window.JSZip){
  await new Promise(res=>{
   const s=document.createElement('script');
   s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
   s.onload=res;
   document.body.appendChild(s);
  });
 }

 const zip=new JSZip();

 for(let i=0;i<photos.length;i++){
  const blob=await fetch(photos[i].data).then(r=>r.blob());
  zip.file(`photo${i}.jpg`,blob);
 }

 const blob=await zip.generateAsync({type:'blob'});

 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='photos.zip';
 a.click();

 toast('ZIP完了');
}

/* ===== GPS ===== */
async function getGPS(){
 try{
  await new Promise((res,rej)=>
   navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000})
  );
  toast('GPS OK');
 }catch(e){
  toast('GPS失敗');
 }
}

/* ===== Init ===== */
async function init(){
 db=await initDB();
 photos=await load();
 render();

 $('#camBtn').onclick=startCamera;
 $('#closeV').onclick=stopCamera;
 $('#snap').onclick=takePhoto;
 $('#zipBtn').onclick=makeZip;
 $('#gpsBtn').onclick=getGPS;
}

init();
</script>

</body>
</html>
