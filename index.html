<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>現場カメラ</title>

<style>
/* ===== UI完全維持 ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#0f172a;color:#e2e8f0}
header{position:sticky;top:0;background:#0f172a;border-bottom:1px solid #334155}
.hd{display:flex;gap:8px;padding:10px}
.btn{padding:7px 11px;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#fff}
.tabs{display:flex;gap:5px;overflow-x:auto}
.tab{padding:5px 10px;background:#111;border:1px solid #333;border-radius:15px}
.tab.on{background:#2563eb}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px}
.pic{aspect-ratio:1;background:#000;border-radius:6px;overflow:hidden}
.pic img{width:100%;height:100%;object-fit:cover}
</style>
</head>

<body>

<header>
  <div class="hd">
    <button class="btn" id="camBtn">📷</button>
    <button class="btn" id="delBtn">削除</button>
  </div>
</header>

<div id="tabs"></div>
<div id="grid" class="grid"></div>

<video id="vid" autoplay playsinline style="display:none"></video>

<script>
'use strict';

/* =========================
   安全ユーティリティ
========================= */
const $ = s => document.querySelector(s);
function safe(fn){try{fn()}catch(e){console.error(e)}}
function uid(){return Date.now()+Math.random()}

/* =========================
   DB
========================= */
let db,photos=[],floor="1階";

function openDB(){
  return new Promise(res=>{
    let r=indexedDB.open("genba_final",1);
    r.onupgradeneeded=e=>{
      let d=e.target.result;
      let s=d.createObjectStore("photos",{keyPath:"id"});
      s.createIndex("floor","floor");
    };
    r.onsuccess=()=>res(r.result);
  });
}

function put(p){
  return new Promise(r=>{
    let tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").put(p);
    tx.oncomplete=r;
  });
}

function getAll(){
  return new Promise(r=>{
    let tx=db.transaction("photos");
    let req=tx.objectStore("photos").getAll();
    req.onsuccess=()=>r(req.result||[]);
  });
}

function delPhoto(id){
  return new Promise(r=>{
    let tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete=r;
  });
}

/* =========================
   カメラ（外カメ固定）
========================= */
let stream=null;

async function startCam(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}},
      audio:false
    });
  }catch(e){
    stream = await navigator.mediaDevices.getUserMedia({video:true});
  }
  let v=$("#vid");
  v.srcObject=stream;
  v.style.display="block";
}

function stopCam(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
  }
}

/* =========================
   黒板（プロ仕様）
========================= */
function drawBB(ctx,w,h){
  let x=w*0.6,y=h*0.7,bw=w*0.35,bh=h*0.25;

  ctx.fillStyle="rgba(0,0,0,0.8)";
  ctx.fillRect(x,y,bw,bh);

  ctx.strokeStyle="#fff";
  ctx.strokeRect(x,y,bw,bh);

  let txt="現場\n電気工事\n"+floor+"\n"+new Date().toLocaleDateString();
  let lines=txt.split("\n");

  let fs=Math.max(14,bw/10);
  ctx.font="bold "+fs+"px sans-serif";
  ctx.fillStyle="#fff";

  lines.forEach((l,i)=>{
    ctx.fillText(l,x+10,y+10+i*fs*1.2);
  });
}

/* =========================
   撮影
========================= */
async function snap(){
  let v=$("#vid");
  if(!v.videoWidth)return;

  let c=document.createElement("canvas");
  c.width=v.videoWidth;
  c.height=v.videoHeight;

  let ctx=c.getContext("2d");
  ctx.drawImage(v,0,0);

  drawBB(ctx,c.width,c.height);

  let blob=await new Promise(r=>c.toBlob(r,"image/jpeg",0.85));

  let p={id:uid(),floor,blob,ts:Date.now()};
  await put(p);

  photos.unshift(p);
  render();
}

/* =========================
   表示
========================= */
function renderTabs(){
  let t=$("#tabs");
  t.innerHTML="";

  ["1階","2階","外部"].forEach(f=>{
    let b=document.createElement("button");
    b.className="tab"+(f===floor?" on":"");
    b.textContent=f;
    b.onclick=()=>{floor=f;renderTabs();render()};
    t.appendChild(b);
  });
}

function render(){
  let g=$("#grid");
  g.innerHTML="";

  photos.filter(p=>p.floor===floor).forEach(p=>{
    let d=document.createElement("div");
    d.className="pic";

    let img=document.createElement("img");
    img.src=URL.createObjectURL(p.blob);

    d.onclick=()=>window.open(img.src);

    d.appendChild(img);
    g.appendChild(d);
  });
}

/* =========================
   削除
========================= */
async function deleteAll(){
  for(let p of photos){
    await delPhoto(p.id);
  }
  photos=[];
  render();
}

/* =========================
   初期化
========================= */
(async function(){
  db=await openDB();
  photos=await getAll();
  photos.sort((a,b)=>b.ts-a.ts);

  renderTabs();
  render();

  $("#camBtn").onclick=startCam;
  $("#vid").onclick=snap;
  $("#delBtn").onclick=deleteAll;
})();
</script>

</body>
</html>
